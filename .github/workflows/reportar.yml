name: Reportar Jogo

on:
  workflow_dispatch:
    inputs:
      season_id:
        description: 'ID da época'
        required: true
        default: 'UCL_SS_3ed'
      date:
        description: 'Data DD/MM/YYYY'
        required: true
      winners:
        description: 'Vencedores (JSON)'
        required: true
      losers:
        description: 'Derrotados (JSON)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install openpyxl

      - name: Actualizar Excel e regenerar site
        run: python3 reportar_action.py
        env:
          SKIP_GIT_PUSH:  '1'
          SEASON_ID:      ${{ github.event.inputs.season_id }}
          JORNADA_DATE:   ${{ github.event.inputs.date }}
          WINNERS_JSON:   ${{ github.event.inputs.winners }}
          LOSERS_JSON:    ${{ github.event.inputs.losers }}

      - name: Commit e push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Jogo ${{ github.event.inputs.date }}"
