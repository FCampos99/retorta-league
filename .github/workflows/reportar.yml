name: Reportar Jogo

on:
  workflow_dispatch:
    inputs:
      season_id:
        description: 'ID da época'
        required: true
        default: 'UCL_SS_3ed'
      date:
        description: 'Data DD/MM/YYYY'
        required: true
      texto:
        description: 'Resultado em texto livre (Claude interpreta)'
        required: false
        default: ''
      winners:
        description: 'Vencedores (JSON) — ignorado se texto preenchido'
        required: false
        default: '[]'
      losers:
        description: 'Derrotados (JSON) — ignorado se texto preenchido'
        required: false
        default: '[]'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install openpyxl anthropic

      - name: Actualizar Excel e regenerar site
        run: python3 reportar_action.py
        env:
          SKIP_GIT_PUSH: '1'
          SEASON_ID:      ${{ github.event.inputs.season_id }}
          JORNADA_DATE:   ${{ github.event.inputs.date }}
          TEXTO:          ${{ github.event.inputs.texto }}
          WINNERS_JSON:   ${{ github.event.inputs.winners }}
          LOSERS_JSON:    ${{ github.event.inputs.losers }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit e push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Jogo ${{ github.event.inputs.date }}"
