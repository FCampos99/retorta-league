<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retorta League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080f09;--bg2:#0d1a10;--card:#111e14;--card2:#0a1a0d;
  --border:#1d3d24;--border2:#254d2e;
  --gold:#c8971a;--gold2:#e8b832;
  --green:#2ecc71;--red:#e74c3c;
  --text:#e8ede9;--muted:#7a957e;--muted2:#b0c4b3;
  --fh:'Oswald',sans-serif;--fb:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}

/* HEADER */
header{background:linear-gradient(160deg,#040d05 0%,#0d2912 60%,#163d1c 100%);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.6);}
.hdr{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.85rem 1.5rem;}
.logo{display:flex;align-items:center;gap:.8rem;}
.logo-badge{width:42px;height:42px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 0 16px rgba(200,151,26,.4);}
.logo h1{font-family:var(--fh);font-size:1.55rem;font-weight:700;color:var(--gold2);letter-spacing:.04em;text-transform:uppercase;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:.75rem;}
.live-badge{background:var(--gold);color:#000;padding:.28rem .85rem;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;animation:pulse 2s infinite;}
.gear-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:.4rem .7rem;cursor:pointer;font-size:1rem;transition:all .15s;}
.gear-btn:hover{color:var(--text);border-color:var(--border2);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,151,26,.4)}50%{box-shadow:0 0 0 7px rgba(200,151,26,0)}}

/* NAV */
.season-nav{background:#050c06;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.season-nav::-webkit-scrollbar{display:none;}
.season-tabs{max-width:1280px;margin:0 auto;display:flex;padding:0 1.5rem;}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:.85rem 1.1rem;font-family:var(--fb);font-size:.78rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;cursor:pointer;transition:all .18s;}
.tab-btn:hover{color:var(--text);border-color:var(--border2);}
.tab-btn.active{color:var(--gold2);border-color:var(--gold);}
.tab-live{display:inline-block;background:var(--gold);color:#000;font-size:.55rem;font-weight:800;padding:.1rem .35rem;border-radius:6px;margin-left:.35rem;vertical-align:middle;}

/* MAIN */
main{max-width:1280px;margin:2rem auto;padding:0 1.5rem;}
.fade-in{animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CAPA HERO */
.capa-hero{display:flex;gap:1.5rem;align-items:stretch;background:var(--card);border:1px solid var(--gold);border-radius:14px;overflow:hidden;margin-bottom:2rem;}
.capa-hero-img{flex-shrink:0;width:140px;}
.capa-hero-img img{width:100%;height:100%;object-fit:cover;display:block;}
.capa-hero-body{flex:1;padding:1.25rem;display:flex;flex-direction:column;justify-content:center;gap:.6rem;}
.capa-hero-tag{font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);font-weight:700;}
.capa-hero-date{font-family:var(--fh);font-size:1.2rem;color:var(--text);}
.capa-hero-link{font-size:.75rem;color:var(--muted);background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;text-align:left;}
.capa-hero-link:hover{color:var(--text);}

/* SEASON HERO */
.season-hero{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:1.75rem;}
.season-title h2{font-family:var(--fh);font-size:1.6rem;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.03em;}
.season-title p{font-size:.8rem;color:var(--muted);margin-top:.25rem;}
.season-pills{display:flex;gap:.75rem;flex-wrap:wrap;}
.pill{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;text-align:center;min-width:80px;}
.pill-val{font-family:var(--fh);font-size:1.5rem;color:var(--gold2);line-height:1;}
.pill-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:.2rem;}

/* SEC TITLE */
.sec-title{font-size:.63rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* STANDINGS */
.standings-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table.standings{width:100%;border-collapse:collapse;background:var(--card);font-size:.88rem;}
table.standings thead tr{background:var(--card2);border-bottom:2px solid var(--gold);}
table.standings th{padding:.7rem .9rem;text-align:left;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:700;white-space:nowrap;}
th.c,td.c{text-align:center;}
table.standings tbody tr{border-bottom:1px solid #172c1a;cursor:pointer;transition:background .13s;}
table.standings tbody tr:last-child{border-bottom:none;}
table.standings tbody tr:hover{background:#19301e;}
table.standings td{padding:.7rem .9rem;vertical-align:middle;}
.pos-cell{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-family:var(--fh);font-weight:700;font-size:.9rem;}
.p1{background:var(--gold);color:#000;}.p2{background:#9e9e9e;color:#000;}.p3{background:#a0693a;color:#fff;}.pn{background:transparent;color:var(--muted);}
.player-avatar{width:32px;height:32px;border-radius:50%;background:var(--border2);display:inline-flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.75rem;color:var(--gold2);flex-shrink:0;}
.player-info{display:flex;align-items:center;gap:.65rem;}
.player-name{font-weight:600;color:var(--text);}
.player-nick{font-size:.72rem;color:var(--muted);margin-top:.1rem;}
.form-strip{display:flex;gap:2px;}
.fw{width:16px;height:16px;border-radius:3px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;color:#fff;}
.fl{width:16px;height:16px;border-radius:3px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;color:#fff;}
.wr-cell{display:flex;align-items:center;gap:.5rem;}
.wr-bar{flex:1;height:4px;background:#1d3d24;border-radius:2px;min-width:50px;}
.wr-fill{height:100%;border-radius:2px;}
.wr-txt{font-size:.8rem;font-weight:700;min-width:34px;text-align:right;}
.mp-val{font-family:var(--fh);font-size:1rem;font-weight:600;}

/* REPORT / CHAT */
.chat-wrap{margin-top:2.5rem;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.chat-head{background:var(--card2);border-bottom:2px solid var(--gold);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.chat-head h3{font-family:var(--fh);font-size:1.1rem;color:var(--gold2);text-transform:uppercase;letter-spacing:.04em;}
.chat-status{display:flex;align-items:center;gap:.4rem;font-size:.75rem;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.warn{background:#f39c12;}
.dot.spin{background:var(--gold);animation:pulse 1s infinite;}
.chat-msgs{padding:1.25rem;display:flex;flex-direction:column;gap:.85rem;min-height:180px;max-height:380px;overflow-y:auto;}
.msg{display:flex;gap:.6rem;align-items:flex-end;}
.msg.bot{flex-direction:row;}
.msg.usr{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;}
.msg.bot .msg-avatar{background:var(--gold);color:#000;}
.msg.usr .msg-avatar{background:var(--border2);color:var(--gold2);font-family:var(--fh);font-weight:700;font-size:.7rem;}
.msg-bubble{max-width:80%;padding:.65rem .9rem;border-radius:12px;font-size:.86rem;line-height:1.5;}
.msg.bot .msg-bubble{background:#19301e;border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.usr .msg-bubble{background:#1e3f26;border:1px solid var(--border2);border-bottom-right-radius:4px;color:var(--text);}
.msg-bubble b{color:var(--gold2);}
.msg-bubble .team-v{color:var(--green);font-weight:600;}
.msg-bubble .team-d{color:var(--red);font-weight:600;}
.chat-actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;}
.btn-confirm{background:var(--gold);color:#000;border:none;border-radius:8px;padding:.5rem 1.2rem;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .14s;font-family:var(--fb);}
.btn-confirm:hover{background:var(--gold2);}
.btn-confirm:disabled{opacity:.45;cursor:not-allowed;}
.btn-reset{background:none;border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .14s;}
.btn-reset:hover{border-color:var(--border2);color:var(--text);}
.chat-input-row{display:flex;gap:.5rem;padding:1rem 1.25rem;border-top:1px solid var(--border);background:var(--card2);}
.chat-input{flex:1;background:#0a1a0d;border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;color:var(--text);font-size:.88rem;font-family:var(--fb);resize:none;outline:none;transition:border .15s;}
.chat-input:focus{border-color:var(--border2);}
.btn-send{background:var(--gold);border:none;border-radius:10px;padding:.65rem 1rem;color:#000;font-size:1rem;cursor:pointer;transition:background .14s;flex-shrink:0;}
.btn-send:hover{background:var(--gold2);}
.no-token-banner{padding:1.5rem 1.25rem;text-align:center;color:var(--muted);font-size:.84rem;line-height:1.8;}
.no-token-banner a{color:var(--gold2);cursor:pointer;text-decoration:underline;}
.date-picker-row{display:flex;align-items:center;gap:.75rem;margin-top:.5rem;flex-wrap:wrap;}
.date-picker-row label{font-size:.78rem;color:var(--muted2);font-weight:600;}
.date-picker-row select{background:#0a1a0d;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.4rem .7rem;font-size:.84rem;cursor:pointer;}
.action-progress{display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--muted2);margin-top:.25rem;}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETTINGS MODAL */
.settings-modal{background:#0d2912;border:1px solid var(--gold);border-radius:16px;width:100%;max-width:520px;padding:1.75rem;position:relative;}
.settings-modal h2{font-family:var(--fh);font-size:1.3rem;color:var(--gold2);text-transform:uppercase;margin-bottom:1.25rem;}
.settings-field{margin-bottom:1.25rem;}
.settings-field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted2);margin-bottom:.4rem;}
.settings-field input{width:100%;background:#0a1a0d;border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;color:var(--text);font-size:.88rem;font-family:var(--fb);}
.settings-field input:focus{outline:none;border-color:var(--border2);}
.settings-note{font-size:.73rem;color:var(--muted);margin-top:.35rem;line-height:1.6;}
.settings-note a{color:var(--gold2);}
.btn-save{background:var(--gold);color:#000;border:none;border-radius:8px;padding:.65rem 1.5rem;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .14s;font-family:var(--fb);}
.btn-save:hover{background:var(--gold2);}

/* ALL-TIME */
.champions-grid{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem;}
.champ-row{display:flex;align-items:center;gap:1rem;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;}
.champ-trophy{font-size:1.5rem;flex-shrink:0;}
.champ-info .cs{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.champ-info .cn{font-family:var(--fh);font-size:1.05rem;color:var(--gold2);}
.champ-record{margin-left:auto;font-size:.75rem;color:var(--muted2);text-align:right;}
.at-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;}
.at-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.at-card h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:1rem;}
.at-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .4rem;border-bottom:1px solid #172c1a;cursor:pointer;border-radius:6px;transition:background .13s;}
.at-row:hover{background:#19301e;}
.at-row:last-child{border-bottom:none;}
.at-rank{font-size:.72rem;color:var(--muted);min-width:18px;text-align:center;font-family:var(--fh);}
.at-name{flex:1;font-size:.88rem;font-weight:500;}
.at-val{font-family:var(--fh);font-size:.95rem;color:var(--gold2);}

/* CAPAS */
.upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:2.5rem;text-align:center;cursor:pointer;background:var(--card);transition:all .18s;margin-bottom:2rem;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:#19301e;}
.upload-icon{font-size:2.5rem;margin-bottom:.5rem;}
.upload-txt{font-weight:600;color:var(--text);margin-bottom:.2rem;}
.upload-sub{font-size:.73rem;color:var(--muted);}
.capas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.25rem;}
.capa-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s;}
.capa-card:hover{transform:translateY(-4px);}
.capa-card img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;}
.capa-date{padding:.5rem .75rem;font-size:.73rem;color:var(--muted2);font-weight:600;}
.capas-empty{text-align:center;color:var(--muted);padding:3rem;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lb-img{max-width:90vw;max-height:90vh;border-radius:8px;}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#112b1c;border:1px solid var(--gold);border-radius:16px;width:100%;max-width:620px;max-height:85vh;overflow-y:auto;padding:1.5rem;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.modal h2{font-family:var(--fh);font-size:1.5rem;color:var(--gold2);text-transform:uppercase;}
.modal-sub{font-size:.82rem;color:var(--muted);margin:.2rem 0 1.25rem;}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.5rem;}
.ms{background:var(--card2);border-radius:8px;padding:.75rem;text-align:center;border:1px solid var(--border);}
.ms .v{font-family:var(--fh);font-size:1.7rem;color:var(--gold2);line-height:1;}
.ms .l{font-size:.62rem;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;margin-top:.2rem;}
.modal table{width:100%;border-collapse:collapse;font-size:.84rem;}
.modal table th{text-align:left;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);padding:.5rem .4rem;border-bottom:1px solid var(--border);}
.modal table td{padding:.55rem .4rem;border-bottom:1px solid #172c1a;color:var(--muted2);}
.modal table td:first-child{color:var(--text);font-weight:600;}
.modal table tr:last-child td{border-bottom:none;}

/* REPORT SECTION */
.rpt-sec{margin-top:2.5rem;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.rpt-head{background:var(--card2);border-bottom:2px solid var(--gold);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.rpt-head h3{font-family:var(--fh);font-size:1.05rem;color:var(--gold2);text-transform:uppercase;letter-spacing:.04em;}
.rpt-body{padding:1.25rem;}
.rpt-date{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.rpt-date label{font-size:.78rem;font-weight:600;color:var(--muted2);}
.rpt-date select{background:#0a1a0d;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.45rem .75rem;font-size:.85rem;cursor:pointer;}
/* Text input mode */
.rpt-text-row{display:flex;gap:.5rem;margin-bottom:1.25rem;}
.rpt-text-input{flex:1;background:#0a1a0d;border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;color:var(--text);font-size:.88rem;font-family:var(--fb);outline:none;transition:border .15s;}
.rpt-text-input:focus{border-color:var(--border2);}
.rpt-text-btn{background:var(--gold);border:none;border-radius:10px;padding:.65rem 1rem;color:#000;font-weight:700;font-size:.9rem;cursor:pointer;white-space:nowrap;}
.rpt-text-btn:hover{background:var(--gold2);}
.rpt-divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.rpt-divider::before,.rpt-divider::after{content:'';flex:1;height:1px;background:var(--border);}
/* Player cards */
.rpt-hint{font-size:.72rem;color:var(--muted);margin-bottom:.75rem;}
.player-cards{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem;}
.pc{display:flex;flex-direction:column;align-items:center;gap:.3rem;background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:.6rem .5rem .5rem;cursor:pointer;transition:all .15s;user-select:none;min-width:68px;position:relative;}
.pc:hover{border-color:var(--border2);transform:translateY(-1px);}
.pc.sv{background:rgba(46,204,113,.13);border-color:var(--green);}
.pc.sd{background:rgba(231,76,60,.13);border-color:var(--red);}
.pc-av{width:36px;height:36px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.8rem;color:var(--gold2);transition:all .15s;}
.pc.sv .pc-av{background:var(--green);color:#fff;}
.pc.sd .pc-av{background:var(--red);color:#fff;}
.pc-name{font-size:.7rem;font-weight:600;text-align:center;line-height:1.2;color:var(--muted2);max-width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc.sv .pc-name{color:var(--green);}
.pc.sd .pc-name{color:var(--red);}
.pc-state{font-size:.65rem;font-weight:800;height:12px;}
.pc.sv .pc-state{color:var(--green);}
.pc.sd .pc-state{color:var(--red);}
/* Add player */
.add-player-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.add-player-input{background:#0a1a0d;border:1px solid var(--border);border-radius:8px;padding:.4rem .75rem;color:var(--text);font-size:.84rem;width:180px;outline:none;}
.add-player-input:focus{border-color:var(--border2);}
.add-player-side{display:flex;gap:.5rem;}
.add-player-side button{background:none;border:2px solid;border-radius:7px;padding:.35rem .8rem;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;}
.add-v{border-color:var(--green);color:var(--green);}.add-v:hover{background:rgba(46,204,113,.15);}
.add-d{border-color:var(--red);color:var(--red);}.add-d:hover{background:rgba(231,76,60,.15);}
/* Preview + actions */
.rpt-preview{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.25rem 0;}
.rpt-box{background:#0a1a0d;border-radius:8px;padding:.75rem;min-height:48px;}
.rpt-box-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;}
.rpt-box-names{font-size:.85rem;color:var(--muted2);line-height:1.6;}
.rpt-actions{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.rpt-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:.65rem 1.5rem;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .14s;font-family:var(--fb);}
.rpt-btn:hover{background:var(--gold2);}
.rpt-btn:disabled{opacity:.45;cursor:not-allowed;}
.rpt-msg{font-size:.82rem;flex:1;}
.rpt-progress{display:inline-flex;align-items:center;gap:.5rem;}
.rpt-no-token{padding:1.5rem 1.25rem;text-align:center;font-size:.84rem;color:var(--muted);line-height:2;}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.72rem;border-top:1px solid var(--border);margin-top:3rem;}
footer a{color:var(--gold);text-decoration:none;}

@media(max-width:680px){
  .hm{display:none;}
  .at-grid{grid-template-columns:1fr;}
  .capa-hero{flex-direction:column;}
  .capa-hero-img{width:100%;max-height:200px;}
  .msg-bubble{max-width:90%;}
}
</style>
</head>

function getToken(){ return localStorage.getItem('gh_token')||''; }
function openSettings(){
  document.getElementById('gh-token-input').value=getToken();

}

/* ── TABS ── */
function renderTabs(){
  const c=document.getElementById('season-tabs'); c.innerHTML='';
  SEASONS.forEach(s=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(s.id===activeTab?' active':'');
    b.textContent=s.label;
    if(s.atual){ const sp=document.createElement('span'); sp.className='tab-live'; sp.textContent='AO VIVO'; b.appendChild(sp); document.getElementById('hdr-badge').style.display=''; }
    b.onclick=()=>switchTab(s.id); c.appendChild(b);
  });
  [['alltime','Histórico Total'],['capas','📰 Capas de Jornais']].forEach(([id,label])=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(activeTab===id?' active':'');
    b.textContent=label;
    b.onclick=()=>switchTab(id); c.appendChild(b);
  });
}
function switchTab(id){
  activeTab=id; renderTabs();
  const el=document.getElementById('content');
  el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in');
  if(id==='alltime') renderAllTime();

  else renderSeason(SEASONS.find(s=>s.id===id));

/* ── HELPERS ── */
function pct(n){ return Math.round(n*100); }
function medal(r){ return r===1?'p1':r===2?'p2':r===3?'p3':'pn'; }
function initials(n){ return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('').toUpperCase(); }
function wrColor(w){ return w>=60?'var(--green)':w>=50?'var(--gold2)':'var(--red)'; }
function formatDate(iso){
  const d=new Date(iso);
  const M=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${d.getDate()} de ${M[d.getMonth()]} de ${d.getFullYear()}`;
}

function renderSeason(season){

  let capaHtml='';
  if(season.atual && CAPAS.length){
    const c=CAPAS[CAPAS.length-1];
    const src=c.filename?`capas/${c.filename}`:c.src;
    capaHtml=`<div class="capa-hero"><div class="capa-hero-img"><img src="${src}" alt="Capa"></div><div class="capa-hero-body"><div class="capa-hero-tag">📰 Última Capa de Jornal</div><div class="capa-hero-date">${formatDate(c.date)}</div><button class="capa-hero-link" onclick="switchTab('capas')">Ver arquivo →</button></div></div>`;
  }
  const played=season.datas.filter((_,i)=>ps.some(p=>p.resultados[i]!==null)).length;
  const topWR=[...ps].filter(p=>p.jogos>=5).sort((a,b)=>b.winRate-a.winRate)[0];

    const wr=pct(p.winRate);

      <td class="hm"><div class="form-strip">${form||'<span style="color:var(--muted);font-size:.72rem">—</span>'}</div></td>
      <td class="hm"><div class="wr-cell"><div class="wr-bar"><div class="wr-fill" style="width:${Math.min(wr,100)}%;background:${wrColor(wr)}"></div></div><span class="wr-txt" style="color:${wrColor(wr)}">${wr}%</span></div></td>
      <td class="c"><span class="mp-val" style="color:${p.mediaPonderada>=.5?'var(--green)':p.mediaPonderada>=.35?'var(--gold2)':'var(--red)'}">${p.mediaPonderada.toFixed(3)}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    ${capaHtml}
    <div class="season-hero">
      <div class="season-title"><h2>${season.tipo} — ${season.edicao}</h2><p>${season.inicio} → ${season.atual?'Em curso':season.fim}</p></div>

        <div class="pill"><div class="pill-val">${ps.length}</div><div class="pill-lbl">Jogadores</div></div>
        <div class="pill"><div class="pill-val">${ps[0]?.alcunha||'—'}</div><div class="pill-lbl">Líder</div></div>
        ${topWR?`<div class="pill"><div class="pill-val">${pct(topWR.winRate)}%</div><div class="pill-lbl">${topWR.alcunha}</div></div>`:''}
      </div>
    </div>
    <div class="sec-title">Classificação</div>
    <div class="standings-wrap">
      <table class="standings">
        <thead><tr>
          <th class="c">Pos</th><th>Jogador</th>
          <th class="c hm">J</th><th class="c hm">V</th><th class="c hm">D</th>
          <th class="hm">Forma</th><th class="hm">Taxa</th><th class="c">Média</th>
        </tr></thead>
        <tbody>${rows}</tbody>

    <p style="font-size:.68rem;color:var(--muted);margin-top:.5rem">Média = Taxa de vitórias × Factor de presença. Clica num jogador para ver o historial.</p>

/* ── REPORT FORM ── */
function buildReportForm(season){
  const token=getToken();
  const today=new Date();
  const playedSet=new Set();
  season.datas.forEach((d,i)=>{ if(season.jogadores.some(p=>p.resultados[i]!==null)) playedSet.add(d); });
  const pastDates=season.datas.filter(d=>{ const [dd,mm,yy]=d.split('/'); return new Date(yy,mm-1,dd)<=today; });
  const nextDate=pastDates.find(d=>!playedSet.has(d))||pastDates[pastDates.length-1]||season.datas[0];
  const dateOpts=season.datas.map(d=>{ const [dd,mm,yy]=d.split('/'); const past=new Date(yy,mm-1,dd)<=today; return `<option value="${d}"${d===nextDate?' selected':''}${!past?' disabled style="color:#444"':''}>${d}${playedSet.has(d)?' ✓':past?' ←':''}</option>`; }).join('');
  const cards=season.jogadores.map(p=>{
    const av=initials(p.nome);
    return `<div class="pc" data-name="${p.nome}" data-r="" onclick="toggleCard(this)" title="${p.nome}">
      <div class="pc-av">${av}</div>
      <div class="pc-name">${p.alcunha}</div>
      <div class="pc-state">·</div>
    </div>`;
  }).join('');

  if(!token) return `
    <div class="rpt-sec">
      <div class="rpt-head"><h3>📋 Reportar Jogo</h3></div>
      <div class="rpt-no-token">
        Para reportar jogos directamente do site, configura o teu GitHub token.<br>
        <button onclick="openSettings()" style="background:var(--gold);color:#000;border:none;border-radius:8px;padding:.5rem 1.2rem;font-weight:700;cursor:pointer;margin-top:.5rem">⚙️ Configurar token</button>
      </div>
    </div>`;

  return `
    <div class="rpt-sec">
      <div class="rpt-head">
        <h3>📋 Reportar Jogo</h3>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.75rem"><span class="dot ok"></span><span>GitHub conectado</span></div>
      </div>
      <div class="rpt-body">

        <div class="rpt-date">
          <label>Jornada:</label>
          <select id="rpt-date">${dateOpts}</select>
        </div>

        <div class="rpt-hint" style="margin-bottom:.5rem;font-size:.73rem;color:var(--muted2)">
          Descreve o resultado em texto e o Claude interpreta automaticamente:
        </div>
        <div class="rpt-text-row">
          <input class="rpt-text-input" id="rpt-text" placeholder='Ex: "Campos, Quim e Rodrigo ganharam. Perderam o Capela, Renato e Vieira"'
            onkeydown="if(event.key==='Enter') sendText('${season.id}')">
          <button class="rpt-text-btn" onclick="sendText('${season.id}')">Enviar ➤</button>
        </div>

        <div class="rpt-divider">ou selecciona manualmente</div>

        <div class="rpt-hint">
          Clica nos jogadores &nbsp;·&nbsp;
          <span style="color:var(--green);font-weight:700">1.º = Vitória</span> &nbsp;·&nbsp;
          <span style="color:var(--red);font-weight:700">2.º = Derrota</span> &nbsp;·&nbsp;
          3.º = retira
        </div>
        <div class="player-cards" id="player-cards">${cards}</div>

        <div class="add-player-row">
          <input class="add-player-input" id="new-player-name" placeholder="Novo jogador...">
          <div class="add-player-side">
            <button class="add-v" onclick="addNewPlayer('W')">+ Vitória</button>
            <button class="add-d" onclick="addNewPlayer('L')">+ Derrota</button>
          </div>
        </div>

        <div class="rpt-preview">
          <div class="rpt-box">
            <div class="rpt-box-lbl" style="color:var(--green)">✅ Equipa que ganhou</div>
            <div class="rpt-box-names" id="prev-v">—</div>
          </div>
          <div class="rpt-box">
            <div class="rpt-box-lbl" style="color:var(--red)">❌ Equipa que perdeu</div>
            <div class="rpt-box-names" id="prev-d">—</div>
          </div>
        </div>
        <div class="rpt-actions">
          <button class="rpt-btn" id="rpt-btn" onclick="submitReport('${season.id}')">Reportar Jogo</button>
          <div class="rpt-msg" id="rpt-msg"></div>
        </div>
      </div>
    </div>`;
}

function toggleCard(el){
  const c=el.dataset.r;
  el.dataset.r=c===''?'W':c==='W'?'L':'';
  const r=el.dataset.r;
  el.className='pc'+(r==='W'?' sv':r==='L'?' sd':'');
  el.querySelector('.pc-state').textContent=r==='W'?'✓ V':r==='L'?'✗ D':'·';
  updatePreview();
}

function addNewPlayer(side){
  const inp=document.getElementById('new-player-name');
  const name=(inp.value||'').trim();
  if(!name) return;
  inp.value='';
  // Create a temporary card for this new player
  const container=document.getElementById('player-cards');
  if(!container) return;
  const av=name.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('').toUpperCase()||name[0].toUpperCase();
  const el=document.createElement('div');
  el.className='pc'+(side==='W'?' sv':' sd');
  el.dataset.name=name; el.dataset.r=side;
  el.onclick=()=>toggleCard(el);
  el.title=name;
  el.innerHTML=`<div class="pc-av">${av}</div><div class="pc-name">${name.split(' ')[0]}</div><div class="pc-state">${side==='W'?'✓ V':'✗ D'}</div>`;
  container.appendChild(el);
  updatePreview();
}

function updatePreview(){
  const W=[],L=[];
  document.querySelectorAll('.pc').forEach(c=>{ if(c.dataset.r==='W') W.push(c.dataset.name.split(' ')[0]); else if(c.dataset.r==='L') L.push(c.dataset.name.split(' ')[0]); });
  const ve=document.getElementById('prev-v'),de=document.getElementById('prev-d');
  if(ve) ve.textContent=W.join(', ')||'—';
  if(de) de.textContent=L.join(', ')||'—';
}

async function sendText(seasonId){
  const text=(document.getElementById('rpt-text').value||'').trim();
  if(!text) return;
  const btn=document.getElementById('rpt-btn');
  if(btn){ btn.disabled=true; btn.textContent='A enviar...'; }
  setMsg('<span class="rpt-progress"><span class="spinner"></span> Claude está a interpretar o resultado...</span>','');
  try {
    const res=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WF_FILE}/dispatches`,{
      method:'POST',
      headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main',inputs:{season_id:seasonId,date:document.getElementById('rpt-date').value,texto:text,winners:'[]',losers:'[]'}})
    });
    if(res.status===204||res.ok){
      if(btn){ btn.textContent='✅ Enviado!'; }
      setMsg('<span class="rpt-progress"><span class="spinner"></span> <span id="poll-txt">A processar (~2 min)...</span></span>','');
      pollAction();
    } else {
      const err=await res.json().catch(()=>({}));
      setMsg(`❌ ${err.message||res.status} <a onclick="openSettings()" style="color:var(--gold2);cursor:pointer">⚙️ token</a>`,'');
      if(btn){ btn.disabled=false; btn.textContent='Reportar Jogo'; }
    }
  } catch {
    setMsg('❌ Sem ligação.','');
    if(btn){ btn.disabled=false; btn.textContent='Reportar Jogo'; }
  }
}

async function submitReport(seasonId){
  const date=document.getElementById('rpt-date').value;
  const W=[],L=[];
  document.querySelectorAll('.chip').forEach(c=>{ if(c.dataset.r==='W') W.push(c.dataset.name); else if(c.dataset.r==='L') L.push(c.dataset.name); });
  if(!W.length||!L.length){ setMsg('Selecciona pelo menos um jogador em cada equipa.','var(--red)'); return; }
  const btn=document.getElementById('rpt-btn');
  btn.disabled=true; btn.textContent='A enviar...';
  setMsg('<span class="rpt-progress"><span class="spinner"></span> A enviar para o GitHub...</span>','');
  try {
    const res=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WF_FILE}/dispatches`,{
      method:'POST',
      headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main',inputs:{season_id:seasonId,date,winners:JSON.stringify(W),losers:JSON.stringify(L)}})
    });
    if(res.status===204||res.ok){
      btn.textContent='✅ Enviado!';
      setMsg('<span class="rpt-progress"><span class="spinner"></span> <span id="poll-txt">A processar (~2 min)...</span></span>','');
      pollAction();
    } else {
      const err=await res.json().catch(()=>({}));
      setMsg(`❌ Erro: ${err.message||res.status} &nbsp;<a onclick="openSettings()" style="color:var(--gold2);cursor:pointer">⚙️ Verificar token</a>`,'');
      btn.disabled=false; btn.textContent='Reportar Jogo';
    }
  } catch {
    setMsg('❌ Sem ligação à internet.','');
    btn.disabled=false; btn.textContent='Reportar Jogo';
  }
}

function setMsg(html,color){
  const el=document.getElementById('rpt-msg');
  if(el){el.innerHTML=html;el.style.color=color;}
}

async function pollAction(){
  await new Promise(r=>setTimeout(r,10000));
  for(let i=0;i<20;i++){
    await new Promise(r=>setTimeout(r,10000));
    try {
      const res=await fetch(`https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&per_page=1`,{
        headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}
      });
      if(!res.ok) break;
      const run=(await res.json()).workflow_runs?.[0];
      if(!run) continue;
      if(run.status==='completed'){
        run.conclusion==='success'
          ? setMsg('✅ <strong>Actualizado!</strong> <button onclick="location.reload()" style="background:var(--gold);border:none;border-radius:6px;padding:.3rem .8rem;cursor:pointer;font-weight:700;color:#000;margin-left:.5rem">Recarregar</button>','var(--green)')
          : setMsg(`❌ Algo correu mal. <a href="https://github.com/${REPO}/actions" target="_blank" style="color:var(--gold2)">Ver Actions</a>`,'');
        return;
      }
      const t=document.getElementById('poll-txt');
      if(t) t.textContent=run.status==='in_progress'?'A correr no GitHub...':'Na fila...';
    } catch {}
  }
}

/* ── ALL-TIME ── */
function renderAllTime(){
  const pm={};
  SEASONS.forEach(s=>s.jogadores.forEach(p=>{
    if(!pm[p.nome]) pm[p.nome]={nome:p.nome,alc:p.alcunha,j:0,v:0,epocas:0};
    pm[p.nome].j+=p.jogos; pm[p.nome].v+=p.vitorias; pm[p.nome].epocas++;
  }));
  const pl=Object.values(pm).filter(p=>p.j>=3);
  const byV=[...pl].sort((a,b)=>b.v-a.v).slice(0,8);
  const byWR=[...pl].filter(p=>p.j>=10).sort((a,b)=>(b.v/b.j)-(a.v/a.j)).slice(0,8);
  const byJ=[...pl].sort((a,b)=>b.j-a.j).slice(0,8);
  const champs=[
    {s:'Época de Verão · 1.ª Edição (2024)',    w:'João Capela',    r:'13V/6D · 68%'},
    {s:'Época de Inverno · 1.ª Edição (2024-25)',w:'João Capela',    r:'13V/5D · 72%'},
    {s:'Época de Verão · 2.ª Edição (2025)',    w:'Joaquim Torrão', r:'12V/7D · 63%'},
    {s:'Época de Inverno · 2.ª Edição (2025-26)',w:'Joaquim Torrão', r:'12V/6D · 67%'},
    {s:'Época de Verão · 3.ª Edição (2026)',    w:'🔴 Em curso',    r:'Líder: Campos 7V/1D'},
  ];
  const list=(arr,fn)=>arr.map((p,i)=>`<div class="at-row" onclick="openModal('${p.nome.replace(/'/g,"\\'")}')"><span class="at-rank">${i+1}</span><span class="at-name">${p.alc||p.nome}</span><span class="at-val">${fn(p)}</span></div>`).join('');
  document.getElementById('content').innerHTML=`
    <div class="season-hero">
      <div class="season-title"><h2>Histórico Total</h2><p>Desde 18/03/2024 · Todas as épocas</p></div>
      <div class="season-pills">
        <div class="pill"><div class="pill-val">5</div><div class="pill-lbl">Épocas</div></div>
        <div class="pill"><div class="pill-val">${Object.keys(pm).length}</div><div class="pill-lbl">Jogadores</div></div>
        <div class="pill"><div class="pill-val">2</div><div class="pill-lbl">Campeões</div></div>
      </div>
    </div>
    <div class="sec-title">Palmarés</div>
    <div class="champions-grid">${champs.map((c,i)=>`<div class="champ-row"><span class="champ-trophy">${i<4?'🏆':'⚡'}</span><div class="champ-info"><div class="cs">${c.s}</div><div class="cn">${c.w}</div></div><div class="champ-record">${c.r}</div></div>`).join('')}</div>
    <div class="at-grid">
      <div class="at-card"><h3>⚽ Mais Vitórias</h3>${list(byV,p=>p.v+'V')}</div>
      <div class="at-card"><h3>📈 Melhor Taxa (mín. 10J)</h3>${list(byWR,p=>Math.round(p.v/p.j*100)+'%')}</div>
      <div class="at-card"><h3>🎽 Mais Presenças</h3>${list(byJ,p=>p.j+'J')}</div>
    </div>`;
}

/* ── CAPAS ── */
function renderCapas(){
  const cards=CAPAS.length===0
    ?'<div class="capas-empty">Ainda não há capas. Faz upload da primeira! 📰</div>'
    :[...CAPAS].reverse().map(c=>{ const src=c.filename?`capas/${c.filename}`:(c.src||''); return `<div class="capa-card" onclick="openLightbox('${src}')"><img src="${src}" alt="Capa" loading="lazy"><div class="capa-date">${formatDate(c.date)}</div></div>`; }).join('');
  document.getElementById('content').innerHTML=`
    <div class="season-hero">
      <div class="season-title"><h2>Capas de Jornais</h2><p>Arquivo de capas da Retorta League</p></div>
      <div class="season-pills"><div class="pill"><div class="pill-val">${CAPAS.length}</div><div class="pill-lbl">Capas</div></div></div>
    </div>
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
      <div class="upload-icon">📰</div><div class="upload-txt">Clica ou arrasta uma imagem</div>
      <div class="upload-sub">JPG · PNG · WEBP</div>
      <input type="file" id="file-in" accept="image/*" multiple style="display:none">
    </div>
    <div class="sec-title">Arquivo</div>
    <div class="capas-grid">${cards}</div>`;
  const fi=document.getElementById('file-in');
  if(fi) fi.onchange=e=>handleFiles(e.target.files);
  const dz=document.getElementById('drop-zone');
  if(dz){ dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');}; dz.ondragleave=()=>dz.classList.remove('drag'); dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);}; }
}
function compress(file,cb){ const img=new Image(),url=URL.createObjectURL(file); img.onload=()=>{ let w=img.width,h=img.height; if(w>1200){h=Math.round(h*1200/w);w=1200;} if(h>1600){w=Math.round(w*1600/h);h=1600;} const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); URL.revokeObjectURL(url); cb(cv.toDataURL('image/jpeg',.85)); }; img.src=url; }
function handleFiles(files){ Array.from(files).forEach(f=>{ if(!f.type.startsWith('image/')) return; compress(f,src=>{ const date=new Date().toISOString(); fetch('http://localhost:8765/upload-capa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({src,date,caption:''})}).then(r=>r.json()).then(d=>{ if(d.ok){alert('✅ Capa guardada e publicada!');location.reload();} }).catch(()=>{ const key='retorta_jornais'; const list=JSON.parse(localStorage.getItem(key)||'[]'); list.push({src,date,caption:''}); localStorage.setItem(key,JSON.stringify(list)); alert('✅ Capa guardada localmente (inicia o servidor para publicar no GitHub)'); renderCapas(); }); }); }); }

/* ── LIGHTBOX ── */
function openLightbox(src){ document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

/* ── PLAYER MODAL ── */
function openModal(nome){
  const entries=[]; SEASONS.forEach(s=>{ const p=s.jogadores.find(j=>j.nome===nome); if(p) entries.push({s,p}); }); if(!entries.length) return;
  const alc=entries[0].p.alcunha||nome;
  const totJ=entries.reduce((a,e)=>a+e.p.jogos,0), totV=entries.reduce((a,e)=>a+e.p.vitorias,0);
  const totWR=totJ?Math.round(totV/totJ*100):0;
  const wrC=totWR>=60?'var(--green)':totWR>=50?'var(--gold2)':'var(--red)';
  const trows=entries.map(e=>{ const p=e.p,s=e.s,wr=pct(p.winRate),c=wrColor(wr),pos=p.rank,pi=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos+'.º'; const form=p.resultados.filter(r=>r).slice(-6).map(r=>r==='W'?'<span class="fw">V</span>':'<span class="fl">D</span>').join(''); return `<tr><td>${s.tipo.replace('Época de ','')} ${s.edicao}</td><td style="text-align:center">${pi}</td><td style="text-align:center">${p.jogos}</td><td style="text-align:center;color:var(--green)">${p.vitorias}</td><td style="text-align:center;color:var(--red)">${p.derrotas}</td><td style="text-align:center;color:${c}">${wr}%</td><td><div class="form-strip">${form}</div></td></tr>`; }).join('');
  document.getElementById('modal-body').innerHTML=`<h2>${nome}</h2><div class="modal-sub">Alcunha: <strong style="color:var(--gold2)">${alc}</strong> · ${entries.length} época${entries.length!==1?'s':''}</div><div class="modal-stats"><div class="ms"><div class="v">${totJ}</div><div class="l">Jogos</div></div><div class="ms"><div class="v" style="color:var(--green)">${totV}</div><div class="l">Vitórias</div></div><div class="ms"><div class="v" style="color:${wrC}">${totWR}%</div><div class="l">Taxa</div></div></div><div class="sec-title" style="margin-bottom:.5rem">Historial por Época</div><table><thead><tr><th>Época</th><th>Pos</th><th>J</th><th>V</th><th>D</th><th>%</th><th>Forma</th></tr></thead><tbody>${trows}</tbody></table>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.getElementById('settings-overlay').addEventListener('click',function(e){ if(e.target===this) closeSettings(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeSettings(); closeLightbox(); } });

// Init
renderTabs();
switchTab(activeTab);
</script>
