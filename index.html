<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retorta League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080f09;
  --bg2:       #0d1a10;
  --card:      #111e14;
  --card2:     #0a1a0d;
  --border:    #1d3d24;
  --border2:   #254d2e;
  --gold:      #c8971a;
  --gold2:     #e8b832;
  --green:     #2ecc71;
  --red:       #e74c3c;
  --text:      #e8ede9;
  --muted:     #7a957e;
  --muted2:    #b0c4b3;
  --font-head: 'Oswald', sans-serif;
  --font-body: 'Inter', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; }

/* ── HEADER ── */
header {
  background: linear-gradient(160deg, #040d05 0%, #0d2912 60%, #163d1c 100%);
  border-bottom: 2px solid var(--gold);
  position: sticky; top:0; z-index:100;
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.header-inner {
  max-width:1280px; margin:0 auto;
  display:flex; align-items:center; gap:1rem;
  padding:0.85rem 1.5rem;
}
.logo { display:flex; align-items:center; gap:0.8rem; }
.logo-badge {
  width:42px; height:42px; background:var(--gold);
  border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:1.3rem;
  box-shadow:0 0 16px rgba(200,151,26,0.4);
}
.logo h1 {
  font-family:var(--font-head); font-size:1.55rem;
  font-weight:700; color:var(--gold2); letter-spacing:0.04em;
  text-transform:uppercase;
}
.live-badge {
  margin-left:auto;
  background:var(--gold); color:#000;
  padding:0.28rem 0.85rem; border-radius:20px;
  font-size:0.68rem; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase;
  animation:pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(200,151,26,0.4)}
  50%{box-shadow:0 0 0 7px rgba(200,151,26,0)}
}

/* ── SEASON NAV ── */
.season-nav {
  background:#050c06; border-bottom:1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.season-nav::-webkit-scrollbar { display:none; }
.season-tabs { max-width:1280px; margin:0 auto; display:flex; padding:0 1.5rem; }
.tab-btn {
  background:none; border:none; border-bottom:3px solid transparent;
  color:var(--muted); padding:0.85rem 1.1rem;
  font-family:var(--font-body); font-size:0.78rem; font-weight:600;
  letter-spacing:0.04em; text-transform:uppercase;
  white-space:nowrap; cursor:pointer; transition:all 0.18s;
}
.tab-btn:hover { color:var(--text); border-color:var(--border2); }
.tab-btn.active { color:var(--gold2); border-color:var(--gold); }
.tab-live {
  display:inline-block; background:var(--gold); color:#000;
  font-size:0.55rem; font-weight:800; padding:0.1rem 0.35rem;
  border-radius:6px; margin-left:0.35rem; vertical-align:middle;
}

/* ── MAIN ── */
main { max-width:1280px; margin:2rem auto; padding:0 1.5rem; }
.fade-in { animation:fadeIn 0.22s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── CAPA HERO ── */
.capa-hero {
  display:flex; gap:1.5rem; align-items:stretch;
  background:var(--card); border:1px solid var(--gold);
  border-radius:14px; overflow:hidden; margin-bottom:2rem;
}
.capa-hero-img { flex-shrink:0; width:140px; }
.capa-hero-img img { width:100%; height:100%; object-fit:cover; display:block; }
.capa-hero-body { flex:1; padding:1.25rem; display:flex; flex-direction:column; justify-content:center; gap:0.6rem; }
.capa-hero-tag { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--gold); font-weight:700; }
.capa-hero-date { font-family:var(--font-head); font-size:1.2rem; color:var(--text); }
.capa-hero-link { font-size:0.75rem; color:var(--muted); background:none; border:none; padding:0; cursor:pointer; text-decoration:underline; text-align:left; }
.capa-hero-link:hover { color:var(--text); }

/* ── SEASON HERO ── */
.season-hero {
  display:flex; justify-content:space-between; align-items:flex-start;
  flex-wrap:wrap; gap:1rem; margin-bottom:1.75rem;
}
.season-title h2 { font-family:var(--font-head); font-size:1.6rem; font-weight:700; color:var(--gold2); text-transform:uppercase; letter-spacing:0.03em; }
.season-title p  { font-size:0.8rem; color:var(--muted); margin-top:0.25rem; }
.season-pills { display:flex; gap:0.75rem; flex-wrap:wrap; }
.pill { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.55rem 1rem; text-align:center; min-width:80px; }
.pill-val { font-family:var(--font-head); font-size:1.5rem; color:var(--gold2); line-height:1; }
.pill-lbl { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-top:0.2rem; }

/* ── SECTION TITLE ── */
.sec-title {
  font-size:0.63rem; text-transform:uppercase; letter-spacing:0.14em;
  color:var(--muted); margin-bottom:0.75rem;
  display:flex; align-items:center; gap:0.6rem;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── STANDINGS TABLE ── */
.standings-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
table.standings {
  width:100%; border-collapse:collapse;
  background:var(--card); font-size:0.88rem;
}
table.standings thead tr { background:var(--card2); border-bottom:2px solid var(--gold); }
table.standings th {
  padding:0.7rem 0.9rem; text-align:left;
  font-size:0.62rem; text-transform:uppercase;
  letter-spacing:0.1em; color:var(--gold); font-weight:700;
  white-space:nowrap;
}
th.c,td.c { text-align:center; }
table.standings tbody tr { border-bottom:1px solid #172c1a; cursor:pointer; transition:background 0.13s; }
table.standings tbody tr:last-child { border-bottom:none; }
table.standings tbody tr:hover { background:#19301e; }
table.standings td { padding:0.7rem 0.9rem; vertical-align:middle; }

.pos-cell { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; font-family:var(--font-head); font-weight:700; font-size:0.9rem; }
.p1 { background:var(--gold); color:#000; }
.p2 { background:#9e9e9e; color:#000; }
.p3 { background:#a0693a; color:#fff; }
.pn { background:transparent; color:var(--muted); }

.player-avatar {
  width:32px; height:32px; border-radius:50%;
  background:var(--border2); display:inline-flex;
  align-items:center; justify-content:center;
  font-family:var(--font-head); font-weight:700; font-size:0.75rem;
  color:var(--gold2); flex-shrink:0;
}
.player-info { display:flex; align-items:center; gap:0.65rem; }
.player-name { font-weight:600; color:var(--text); }
.player-nick { font-size:0.72rem; color:var(--muted); margin-top:0.1rem; }

.form-strip { display:flex; gap:2px; }
.fw { width:16px; height:16px; border-radius:3px; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:0.55rem; font-weight:800; color:#fff; }
.fl { width:16px; height:16px; border-radius:3px; background:var(--red);   display:flex; align-items:center; justify-content:center; font-size:0.55rem; font-weight:800; color:#fff; }
.fa { width:16px; height:16px; border-radius:3px; background:#1d3d24; }

.wr-cell { display:flex; align-items:center; gap:0.5rem; }
.wr-bar  { flex:1; height:4px; background:#1d3d24; border-radius:2px; min-width:50px; }
.wr-fill { height:100%; border-radius:2px; }
.wr-txt  { font-size:0.8rem; font-weight:700; min-width:34px; text-align:right; }
.mp-val  { font-family:var(--font-head); font-size:1rem; font-weight:600; }

/* ── REPORT SECTION ── */
.report-section { margin-top:2.5rem; background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.report-head { background:var(--card2); border-bottom:2px solid var(--gold); padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
.report-head h3 { font-family:var(--font-head); font-size:1.1rem; color:var(--gold2); text-transform:uppercase; letter-spacing:0.04em; }
.srv-status { display:flex; align-items:center; gap:0.4rem; font-size:0.75rem; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot.on  { background:var(--green); box-shadow:0 0 6px var(--green); }
.dot.off { background:var(--red); }
.dot.chk { background:var(--gold); animation:pulse 1s infinite; }
.report-offline {
  padding:2rem 1.25rem; text-align:center;
  color:var(--muted); font-size:0.85rem; line-height:1.8;
}
.report-offline code { background:var(--card2); padding:0.2rem 0.5rem; border-radius:5px; font-size:0.8rem; color:var(--gold2); }
.report-body { padding:1.25rem; }
.date-row { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.date-row label { font-size:0.78rem; font-weight:600; color:var(--muted2); min-width:70px; }
.date-row select { background:var(--card2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:0.45rem 0.75rem; font-size:0.85rem; cursor:pointer; }
.chips-hint { font-size:0.72rem; color:var(--muted); margin-bottom:0.65rem; }
.chips-wrap { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:1.25rem; }
.chip { background:var(--card2); border:1px solid var(--border); border-radius:20px; padding:0.3rem 0.75rem; font-size:0.78rem; cursor:pointer; user-select:none; transition:all 0.14s; }
.chip:hover { border-color:var(--border2); }
.chip.sv { background:rgba(46,204,113,0.12); border-color:var(--green); color:var(--green); font-weight:700; }
.chip.sd { background:rgba(231,76,60,0.12); border-color:var(--red); color:var(--red); font-weight:700; }
.preview-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem; }
.prev-box { background:var(--card2); border-radius:8px; padding:0.75rem; min-height:44px; }
.prev-box .pl { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.3rem; }
.prev-box.pv .pl { color:var(--green); }
.prev-box.pd .pl { color:var(--red); }
.prev-box .pn { color:var(--muted2); font-size:0.82rem; line-height:1.6; }
.extras-wrap { margin-bottom:1rem; }
.extras-wrap label { font-size:0.73rem; color:var(--muted); display:block; margin-bottom:0.3rem; }
.extras-wrap input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:0.45rem 0.75rem; color:var(--text); font-size:0.84rem; }
.act-row { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
.btn-submit { background:var(--gold); color:#000; border:none; border-radius:8px; padding:0.65rem 1.5rem; font-weight:700; font-size:0.9rem; cursor:pointer; transition:background 0.14s; font-family:var(--font-body); }
.btn-submit:hover { background:var(--gold2); }
.btn-submit:disabled { opacity:0.45; cursor:not-allowed; }
.rpt-msg { font-size:0.82rem; flex:1; }
.rpt-msg.ok  { color:var(--green); }
.rpt-msg.err { color:var(--red); }
.btn-reload { background:var(--border2); color:#fff; border:none; border-radius:6px; padding:0.35rem 0.85rem; cursor:pointer; font-size:0.78rem; font-weight:700; }

/* ── ALL-TIME ── */
.champions-grid { display:flex; flex-direction:column; gap:0.75rem; margin-bottom:2rem; }
.champ-row { display:flex; align-items:center; gap:1rem; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:0.85rem 1rem; }
.champ-trophy { font-size:1.5rem; flex-shrink:0; }
.champ-info .cs { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }
.champ-info .cn { font-family:var(--font-head); font-size:1.05rem; color:var(--gold2); }
.champ-record { margin-left:auto; font-size:0.75rem; color:var(--muted2); text-align:right; }
.at-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1.5rem; }
.at-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; }
.at-card h3 { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); margin-bottom:1rem; }
.at-row { display:flex; align-items:center; gap:0.6rem; padding:0.45rem 0.4rem; border-bottom:1px solid #172c1a; cursor:pointer; border-radius:6px; transition:background 0.13s; }
.at-row:hover { background:#19301e; }
.at-row:last-child { border-bottom:none; }
.at-rank { font-size:0.72rem; color:var(--muted); min-width:18px; text-align:center; font-family:var(--font-head); }
.at-name { flex:1; font-size:0.88rem; font-weight:500; }
.at-val  { font-family:var(--font-head); font-size:0.95rem; color:var(--gold2); }

/* ── CAPAS ── */
.upload-zone {
  border:2px dashed var(--border2); border-radius:14px;
  padding:2.5rem; text-align:center; cursor:pointer;
  background:var(--card); transition:all 0.18s; margin-bottom:2rem;
}
.upload-zone:hover,.upload-zone.drag { border-color:var(--gold); background:#19301e; }
.upload-icon { font-size:2.5rem; margin-bottom:0.5rem; }
.upload-txt  { font-weight:600; color:var(--text); margin-bottom:0.2rem; }
.upload-sub  { font-size:0.73rem; color:var(--muted); }
.capas-grid  { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:1.25rem; }
.capa-card   { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; cursor:pointer; transition:transform 0.15s; }
.capa-card:hover { transform:translateY(-4px); }
.capa-card img { width:100%; display:block; aspect-ratio:3/4; object-fit:cover; }
.capa-date   { padding:0.5rem 0.75rem; font-size:0.73rem; color:var(--muted2); font-weight:600; }
.capas-empty { text-align:center; color:var(--muted); padding:3rem; }

/* ── LIGHTBOX ── */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:300; align-items:center; justify-content:center; }
.lightbox.open { display:flex; }
.lb-img { max-width:90vw; max-height:90vh; border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,0.8); }
.lb-close { position:absolute; top:1.5rem; right:1.5rem; background:none; border:none; color:#fff; font-size:2rem; cursor:pointer; line-height:1; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.open { display:flex; }
.modal { background:#112b1c; border:1px solid var(--gold); border-radius:16px; width:100%; max-width:620px; max-height:85vh; overflow-y:auto; padding:1.5rem; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
.modal-close { position:absolute; top:1rem; right:1rem; background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.modal h2 { font-family:var(--font-head); font-size:1.5rem; color:var(--gold2); text-transform:uppercase; }
.modal-sub { font-size:0.82rem; color:var(--muted); margin:0.2rem 0 1.25rem; }
.modal-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.5rem; }
.ms { background:var(--card2); border-radius:8px; padding:0.75rem; text-align:center; border:1px solid var(--border); }
.ms .v { font-family:var(--font-head); font-size:1.7rem; color:var(--gold2); line-height:1; }
.ms .l { font-size:0.62rem; text-transform:uppercase; color:var(--muted); letter-spacing:0.06em; margin-top:0.2rem; }
.modal table { width:100%; border-collapse:collapse; font-size:0.84rem; }
.modal table th { text-align:left; font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold); padding:0.5rem 0.4rem; border-bottom:1px solid var(--border); }
.modal table td { padding:0.55rem 0.4rem; border-bottom:1px solid #172c1a; color:var(--muted2); }
.modal table td:first-child { color:var(--text); font-weight:600; }
.modal table tr:last-child td { border-bottom:none; }

/* ── FOOTER ── */
footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.72rem; border-top:1px solid var(--border); margin-top:3rem; }

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .hm { display:none; }
  .at-grid { grid-template-columns:1fr; }
  .modal-stats { grid-template-columns:repeat(3,1fr); }
  .preview-row { grid-template-columns:1fr; }
  .capa-hero { flex-direction:column; }
  .capa-hero-img { width:100%; max-height:200px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">⚽</div>
      <h1>Retorta League</h1>
    </div>
    <span class="live-badge" id="hdr-badge" style="display:none">Época Activa</span>
  </div>
</header>

<nav class="season-nav">
  <div class="season-tabs" id="season-tabs"></div>
</nav>

<main>
  <div id="content" class="fade-in"></div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
</div>

<footer>Retorta League · Futebol de 5 · <a href="https://fcampos99.github.io/retorta-league/" style="color:var(--gold);text-decoration:none">fcampos99.github.io/retorta-league</a></footer>

  const c = document.getElementById('season-tabs');
  c.innerHTML = '';
  SEASONS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (s.id === activeTab ? ' active' : '');
    b.textContent = s.label;
    if (s.atual) {
      const sp = document.createElement('span');
      sp.className = 'tab-live'; sp.textContent = 'AO VIVO';
      b.appendChild(sp);
      document.getElementById('hdr-badge').style.display = '';
    }
    b.onclick = () => switchTab(s.id);
    c.appendChild(b);
  });
  ['alltime','capas'].forEach((id,i) => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (activeTab === id ? ' active' : '');
    b.textContent = id === 'alltime' ? 'Histórico Total' : '📰 Capas de Jornais';
    b.onclick = () => switchTab(id);
    c.appendChild(b);
  });
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  const el = document.getElementById('content');
  el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in');
  if (id === 'alltime') renderAllTime();
  else if (id === 'capas') renderCapas();
  else renderSeason(SEASONS.find(s => s.id === id));
}

/* ── HELPERS ── */
function pct(n){ return Math.round(n*100); }
function medal(r){ return r===1?'p1':r===2?'p2':r===3?'p3':'pn'; }
function initials(nome){ return nome.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(w=>w[0]).join('').toUpperCase(); }
function wrColor(wr){ return wr>=60?'var(--green)':wr>=50?'var(--gold2)':'var(--red)'; }
function formatDate(iso) {
  const d = new Date(iso);
  const M = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${d.getDate()} de ${M[d.getMonth()]} de ${d.getFullYear()}`;
}

/* ── SEASON ── */
function renderSeason(season) {
  const ps = season.jogadores;

  // Capa hero
  let capaHtml = '';
  if (season.atual) {
    const latest = CAPAS.length ? CAPAS[CAPAS.length-1] : null;
    if (latest) {
      const src = latest.filename ? `capas/${latest.filename}` : latest.src;
      capaHtml = `<div class="capa-hero">
        <div class="capa-hero-img"><img src="${src}" alt="Capa"></div>
        <div class="capa-hero-body">
          <div class="capa-hero-tag">📰 Última Capa de Jornal</div>
          <div class="capa-hero-date">${formatDate(latest.date)}</div>
          <button class="capa-hero-link" onclick="switchTab('capas')">Ver arquivo →</button>
        </div>
      </div>`;
    }
  }

  // Stats
  const played = season.datas.filter((_,i)=>ps.some(p=>p.resultados[i]!==null)).length;
  const topWR  = [...ps].filter(p=>p.jogos>=5).sort((a,b)=>b.winRate-a.winRate)[0];

  // Table rows
  const rows = ps.map(p => {
    const wr = pct(p.winRate);
    const form = p.resultados.filter(r=>r).slice(-5).map(r=>`<span class="${r==='W'?'fw':'fl'}">${r==='W'?'V':'D'}</span>`).join('');
    return `<tr onclick="openModal('${p.nome.replace(/'/g,"\'")}')">
      <td class="c"><span class="pos-cell ${medal(p.rank)}">${p.rank}</span></td>
      <td><div class="player-info">
        <div class="player-avatar">${initials(p.nome)}</div>
        <div><div class="player-name">${p.nome}</div><div class="player-nick">${p.alcunha}</div></div>
      </div></td>
      <td class="c hm">${p.jogos}</td>
      <td class="c hm" style="color:var(--green);font-weight:700">${p.vitorias}</td>
      <td class="c hm" style="color:var(--red);font-weight:700">${p.derrotas}</td>
      <td class="hm"><div class="form-strip">${form||'<span style="color:var(--muted);font-size:0.72rem">—</span>'}</div></td>
      <td class="hm"><div class="wr-cell">
        <div class="wr-bar"><div class="wr-fill" style="width:${Math.min(wr,100)}%;background:${wrColor(wr)}"></div></div>
        <span class="wr-txt" style="color:${wrColor(wr)}">${wr}%</span>
      </div></td>
      <td class="c"><span class="mp-val" style="color:${p.mediaPonderada>=0.5?'var(--green)':p.mediaPonderada>=0.35?'var(--gold2)':'var(--red)'}">${p.mediaPonderada.toFixed(3)}</span></td>
    </tr>`;
  }).join('');

  const reportHtml = season.atual ? buildReportForm(season) : '';

  document.getElementById('content').innerHTML = `
    ${capaHtml}
    <div class="season-hero">
      <div class="season-title">
        <h2>${season.tipo} — ${season.edicao}</h2>
        <p>${season.inicio} → ${season.atual ? 'Em curso' : season.fim}</p>
      </div>
      <div class="season-pills">
        <div class="pill"><div class="pill-val">${played}</div><div class="pill-lbl">Jornadas</div></div>
        <div class="pill"><div class="pill-val">${ps.length}</div><div class="pill-lbl">Jogadores</div></div>
        <div class="pill"><div class="pill-val">${ps[0]?.alcunha||'—'}</div><div class="pill-lbl">Líder</div></div>
        ${topWR?`<div class="pill"><div class="pill-val">${pct(topWR.winRate)}%</div><div class="pill-lbl">${topWR.alcunha} (melhor %)</div></div>`:''}
      </div>
    </div>
    <div class="sec-title">Classificação</div>
    <div class="standings-wrap">
      <table class="standings">
        <thead><tr>
          <th class="c">Pos</th><th>Jogador</th>
          <th class="c hm">J</th><th class="c hm">V</th><th class="c hm">D</th>
          <th class="hm">Forma</th><th class="hm">Taxa</th><th class="c">Média</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:0.68rem;color:var(--muted);margin-top:0.5rem">Média = Taxa de vitórias × Factor de presença. Clica num jogador para ver o historial.</p>
    ${reportHtml}`;

  if (season.atual) { checkServer(); updatePreview(); }
}

/* ── REPORT FORM ── */
function buildReportForm(season) {
  const today = new Date();
  const playedSet = new Set();
  season.datas.forEach((d,i) => {
    if (season.jogadores.some(p=>p.resultados[i]!==null)) playedSet.add(d);
  });
  const pastDates = season.datas.filter(d => { const [dd,mm,yy]=d.split('/'); return new Date(yy,mm-1,dd)<=today; });
  const next = pastDates.find(d=>!playedSet.has(d)) || pastDates[pastDates.length-1] || season.datas[0];
  const opts = season.datas.map(d => {
    const [dd,mm,yy]=d.split('/'); const past=new Date(yy,mm-1,dd)<=today;
    return `<option value="${d}" ${d===next?'selected':''} ${!past?'disabled style="color:#444"':''}>${d}${playedSet.has(d)?' ✓':past?' ←':''}</option>`;
  }).join('');
  const chips = season.jogadores.map(p=>
    `<span class="chip" data-name="${p.nome}" data-r="" onclick="toggleChip(this)">${p.alcunha}</span>`
  ).join('');
  return `
    <div class="report-section" style="margin-top:2.5rem">
      <div class="report-head">
        <h3>📋 Reportar Jogo</h3>
        <div class="srv-status" id="srv-status"><span class="dot chk"></span><span id="srv-txt" style="margin-left:0.4rem;font-size:0.75rem">A verificar...</span></div>
      </div>
      <div id="report-inner">
        <div class="report-offline" id="report-offline" style="display:none">
          Servidor local desligado. Para reportar jogos corre:<br><br>
          <code>python3 reportar.py "Campos, Quim ganharam contra Capela, Renato"</code><br><br>
          ou inicia o servidor: <code>python3 server.py</code>
        </div>
        <div class="report-body" id="report-form">
          <div class="date-row"><label>Jornada:</label><select id="rpt-date">${opts}</select></div>
          <div class="chips-hint">1.º clique <span style="color:var(--green)">Vitória</span> · 2.º <span style="color:var(--red)">Derrota</span> · 3.º retirar</div>
          <div class="chips-wrap">${chips}</div>
          <div class="extras-wrap">
            <label>Outros jogadores (vírgula a separar):</label>
            <input id="extra-in" placeholder="Nome A, Nome B" oninput="updatePreview()">
            <div style="display:flex;gap:1rem;margin-top:0.4rem;font-size:0.8rem">
              <label><input type="radio" name="eside" value="W" checked> Vitória</label>
              <label><input type="radio" name="eside" value="L"> Derrota</label>
            </div>
          </div>
          <div class="preview-row">
            <div class="prev-box pv"><div class="pl">✅ Equipa que ganhou</div><div class="pn" id="prev-v">—</div></div>
            <div class="prev-box pd"><div class="pl">❌ Equipa que perdeu</div><div class="pn" id="prev-d">—</div></div>
          </div>
          <div class="act-row">
            <button class="btn-submit" id="btn-sub" onclick="submitReport('${season.id}')">Enviar Resultado</button>
            <div class="rpt-msg" id="rpt-msg"></div>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleChip(el) {
  const c = el.dataset.r;
  el.dataset.r = c===''?'W':c==='W'?'L':'';
  el.className = 'chip' + (el.dataset.r==='W'?' sv':el.dataset.r==='L'?' sd':'');
  updatePreview();
}
function updatePreview() {
  const W=[],L=[];
  document.querySelectorAll('.chip').forEach(c=>{ if(c.dataset.r==='W')W.push(c.dataset.name.split(' ')[0]); else if(c.dataset.r==='L')L.push(c.dataset.name.split(' ')[0]); });
  const ex = (document.getElementById('extra-in')||{value:''}).value.split(',').map(s=>s.trim()).filter(Boolean);
  const side = (document.querySelector('input[name=eside]:checked')||{value:'W'}).value;
  if(ex.length) (side==='W'?W:L).push(...ex);
  const ve=document.getElementById('prev-v'), de=document.getElementById('prev-d');
  if(ve) ve.textContent=W.join(', ')||'—';
  if(de) de.textContent=L.join(', ')||'—';
}
async function submitReport(sid) {
  const date=document.getElementById('rpt-date').value;
  const W=[],L=[];
  document.querySelectorAll('.chip').forEach(c=>{ if(c.dataset.r==='W')W.push(c.dataset.name); else if(c.dataset.r==='L')L.push(c.dataset.name); });
  const ex=(document.getElementById('extra-in').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const side=(document.querySelector('input[name=eside]:checked')||{value:'W'}).value;
  if(ex.length)(side==='W'?W:L).push(...ex);
  if(!W.length||!L.length){setMsg('Selecciona jogadores nas duas equipas.','err');return;}
  const btn=document.getElementById('btn-sub');
  btn.disabled=true; btn.textContent='A enviar...';
  try {
    const res=await fetch('http://localhost:8765/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({season_id:sid,date,winners:W,losers:L})});
    const d=await res.json();
    if(d.ok){
      const nf=d.not_found.length?` (não encontrados: ${d.not_found.join(', ')})`:'' ;
      setMsg(`✅ ${d.updated.length} jogadores actualizados${nf}. <button class="btn-reload" onclick="location.reload()">Recarregar</button>`,'ok');
    } else setMsg('❌ '+d.error,'err');
  } catch { setMsg('❌ Servidor não encontrado.','err'); }
  btn.disabled=false; btn.textContent='Enviar Resultado';
}
function setMsg(html,cls){const el=document.getElementById('rpt-msg');if(el){el.innerHTML=html;el.className='rpt-msg '+cls;}}

async function checkServer() {
  const dot=document.querySelector('.dot.chk'), txt=document.getElementById('srv-txt');
  const form=document.getElementById('report-form'), offline=document.getElementById('report-offline');
  try {
    const r=await fetch('http://localhost:8765/ping',{signal:AbortSignal.timeout(1500)});
    if(r.ok){
      if(dot){dot.className='dot on';}
      if(txt) txt.textContent='Servidor ligado';
      if(form) form.style.display='';
      if(offline) offline.style.display='none';
      return;
    }
  } catch {}
  if(dot) dot.className='dot off';
  if(txt) txt.textContent='Servidor desligado';
  if(form) form.style.display='none';
  if(offline) offline.style.display='';
}

/* ── ALL-TIME ── */
function renderAllTime() {
  const pm={};
  SEASONS.forEach(s=>s.jogadores.forEach(p=>{
    if(!pm[p.nome]) pm[p.nome]={nome:p.nome,alc:p.alcunha,j:0,v:0,epocas:0};
    pm[p.nome].j+=p.jogos; pm[p.nome].v+=p.vitorias; pm[p.nome].epocas++;
  }));
  const pl=Object.values(pm).filter(p=>p.j>=3);
  const byV  =[...pl].sort((a,b)=>b.v-a.v).slice(0,8);
  const byWR =[...pl].filter(p=>p.j>=10).sort((a,b)=>(b.v/b.j)-(a.v/a.j)).slice(0,8);
  const byJ  =[...pl].sort((a,b)=>b.j-a.j).slice(0,8);

  const champs=[
    {s:'Época de Verão · 1.ª Edição (2024)',    w:'João Capela',       r:'13V/6D · 68%'},
    {s:'Época de Inverno · 1.ª Edição (2024-25)',w:'João Capela',       r:'13V/5D · 72%'},
    {s:'Época de Verão · 2.ª Edição (2025)',    w:'Joaquim Torrão',    r:'12V/7D · 63%'},
    {s:'Época de Inverno · 2.ª Edição (2025-26)',w:'Joaquim Torrão',   r:'12V/6D · 67%'},
    {s:'Época de Verão · 3.ª Edição (2026)',    w:'🔴 Em curso',       r:'Líder: Campos 7V/1D'},
  ];
  const trophy=['🏆','🏆','🏆','🏆','⚡'];
  const champHtml=champs.map((c,i)=>`
    <div class="champ-row">
      <span class="champ-trophy">${trophy[i]}</span>
      <div class="champ-info"><div class="cs">${c.s}</div><div class="cn">${c.w}</div></div>
      <div class="champ-record">${c.r}</div>
    </div>`).join('');

  const list=(arr,fn)=>arr.map((p,i)=>`
    <div class="at-row" onclick="openModal('${p.nome.replace(/'/g,"\'")}')">
      <span class="at-rank">${i+1}</span>
      <span class="at-name">${p.alc||p.nome}</span>
      <span class="at-val">${fn(p)}</span>
    </div>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="season-hero">
      <div class="season-title"><h2>Histórico Total</h2><p>Desde 18/03/2024 · Todas as épocas</p></div>
      <div class="season-pills">
        <div class="pill"><div class="pill-val">5</div><div class="pill-lbl">Épocas</div></div>
        <div class="pill"><div class="pill-val">${Object.keys(pm).length}</div><div class="pill-lbl">Jogadores</div></div>
        <div class="pill"><div class="pill-val">2</div><div class="pill-lbl">Campeões</div></div>
      </div>
    </div>
    <div class="sec-title">Palmarés</div>
    <div class="champions-grid">${champHtml}</div>
    <div class="at-grid">
      <div class="at-card"><h3>⚽ Mais Vitórias</h3>${list(byV,p=>p.v+'V')}</div>
      <div class="at-card"><h3>📈 Melhor Taxa (mín. 10J)</h3>${list(byWR,p=>Math.round(p.v/p.j*100)+'%')}</div>
      <div class="at-card"><h3>🎽 Mais Presenças</h3>${list(byJ,p=>p.j+'J')}</div>
    </div>`;
}

/* ── CAPAS ── */
function renderCapas() {
  const cards = CAPAS.length===0
    ? '<div class="capas-empty">Ainda não há capas. Faz upload da primeira! 📰</div>'
    : [...CAPAS].reverse().map(c=>{
        const src = c.filename ? `capas/${c.filename}` : (c.src||'');
        return `<div class="capa-card" onclick="openLightbox('${src}')">
          <img src="${src}" alt="Capa" loading="lazy">
          <div class="capa-date">${formatDate(c.date)}</div>
        </div>`;
      }).join('');

  document.getElementById('content').innerHTML=`
    <div class="season-hero">
      <div class="season-title"><h2>Capas de Jornais</h2><p>Arquivo de capas da Retorta League</p></div>
      <div class="season-pills"><div class="pill"><div class="pill-val">${CAPAS.length}</div><div class="pill-lbl">Capas</div></div></div>
    </div>
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
      <div class="upload-icon">📰</div>
      <div class="upload-txt">Clica ou arrasta uma imagem</div>
      <div class="upload-sub">JPG · PNG · WEBP — máx. 10 MB por imagem</div>
      <input type="file" id="file-in" accept="image/*" multiple style="display:none">
    </div>
    <div class="sec-title">Arquivo</div>
    <div class="capas-grid">${cards}</div>`;

  const fi=document.getElementById('file-in');
  if(fi) fi.onchange=e=>handleFiles(e.target.files);
  const dz=document.getElementById('drop-zone');
  if(dz){
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag');};
    dz.ondragleave=()=>dz.classList.remove('drag');
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);};
  }
}

function compress(file,cb){
  const img=new Image(), url=URL.createObjectURL(file);
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>1200){h=Math.round(h*1200/w);w=1200;}
    if(h>1600){w=Math.round(w*1600/h);h=1600;}
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    cb(cv.toDataURL('image/jpeg',0.85));
  };
  img.src=url;
}

function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/')) return;
    compress(f,src=>{
      const date=new Date().toISOString();
      // Try server first (saves to git), fall back to localStorage
      fetch('http://localhost:8765/upload-capa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({src,date,caption:''})})
        .then(r=>r.json())
        .then(d=>{ if(d.ok){ alert('✅ Capa guardada e publicada no GitHub!'); location.reload(); } })
        .catch(()=>{
          // Fallback: localStorage
          const key='retorta_jornais';
          const list=JSON.parse(localStorage.getItem(key)||'[]');
          list.push({src,date,caption:''});
          localStorage.setItem(key,JSON.stringify(list));
          alert('✅ Capa guardada localmente (inicia o servidor para publicar no GitHub)');
          renderCapas();
        });
    });
  });
}

/* ── LIGHTBOX ── */
function openLightbox(src){ document.getElementById('lb-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeLightbox(); } });

/* ── PLAYER MODAL ── */
function openModal(nome){
  const entries=[];
  SEASONS.forEach(s=>{ const p=s.jogadores.find(j=>j.nome===nome); if(p) entries.push({s,p}); });
  if(!entries.length) return;
  const alc=entries[0].p.alcunha||nome;
  const totJ=entries.reduce((a,e)=>a+e.p.jogos,0);
  const totV=entries.reduce((a,e)=>a+e.p.vitorias,0);
  const totWR=totJ?Math.round(totV/totJ*100):0;
  const wrC=totWR>=60?'var(--green)':totWR>=50?'var(--gold2)':'var(--red)';
  const trows=entries.map(e=>{
    const p=e.p,s=e.s;
    const wr=pct(p.winRate),c=wrColor(wr);
    const pos=p.rank,pi=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos+'.º';
    const form=p.resultados.filter(r=>r).slice(-6).map(r=>r==='W'?'<span class="fw">V</span>':'<span class="fl">D</span>').join('');
    return `<tr><td>${s.tipo.replace('Época de ','')} ${s.edicao}</td><td style="text-align:center">${pi}</td><td style="text-align:center">${p.jogos}</td><td style="text-align:center;color:var(--green)">${p.vitorias}</td><td style="text-align:center;color:var(--red)">${p.derrotas}</td><td style="text-align:center;color:${c}">${wr}%</td><td><div class="form-strip">${form}</div></td></tr>`;
  }).join('');
  document.getElementById('modal-body').innerHTML=`
    <h2>${nome}</h2><div class="modal-sub">Alcunha: <strong style="color:var(--gold2)">${alc}</strong> · ${entries.length} época${entries.length!==1?'s':''}</div>
    <div class="modal-stats">
      <div class="ms"><div class="v">${totJ}</div><div class="l">Jogos</div></div>
      <div class="ms"><div class="v" style="color:var(--green)">${totV}</div><div class="l">Vitórias</div></div>
      <div class="ms"><div class="v" style="color:${wrC}">${totWR}%</div><div class="l">Taxa</div></div>
    </div>
    <div class="sec-title" style="margin-bottom:0.5rem">Historial por Época</div>
    <table><thead><tr><th>Época</th><th>Pos</th><th>J</th><th>V</th><th>D</th><th>%</th><th>Forma</th></tr></thead><tbody>${trows}</tbody></table>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this)closeModal(); });

// Init
renderTabs();
switchTab(activeTab);
