<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retorta League</title>
<style>
  :root {
    --verde: #0d2818;
    --verde-medio: #1a4a2e;
    --verde-claro: #2d6a45;
    --ouro: #d4a017;
    --ouro-claro: #f0c040;
    --branco: #f5f5f0;
    --cinza: #888;
    --cinza-claro: #ccc;
    --vitoria: #2ecc71;
    --derrota: #e74c3c;
    --ausente: #555;
    --card-bg: #112b1c;
    --card-border: #1e4d30;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--verde);
    color: var(--branco);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a1f10 0%, #1a4a2e 100%);
    border-bottom: 3px solid var(--ouro);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem 0;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .logo-icon {
    font-size: 2.2rem;
    filter: drop-shadow(0 0 8px rgba(212,160,23,0.5));
  }
  .logo-text h1 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--ouro-claro);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .logo-text span {
    font-size: 0.75rem;
    color: var(--cinza-claro);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .header-badge {
    margin-left: auto;
    background: var(--ouro);
    color: #000;
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(212,160,23,0); }
  }

  /* SEASON NAV */
  .season-nav {
    background: #091a0f;
    border-bottom: 1px solid var(--card-border);
    padding: 0 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .season-nav::-webkit-scrollbar { display: none; }
  .season-tabs {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--cinza-claro);
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tab-btn:hover { color: var(--branco); border-color: var(--verde-claro); }
  .tab-btn.active { color: var(--ouro-claro); border-color: var(--ouro); }
  .tab-btn .tab-badge {
    display: inline-block;
    background: var(--ouro);
    color: #000;
    font-size: 0.6rem;
    padding: 0.1rem 0.35rem;
    border-radius: 8px;
    margin-left: 0.3rem;
    vertical-align: middle;
    font-weight: 800;
  }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  /* SEASON HERO */
  .season-hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .season-title h2 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--ouro-claro);
  }
  .season-title p {
    font-size: 0.85rem;
    color: var(--cinza-claro);
    margin-top: 0.2rem;
  }
  .season-stats {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    text-align: center;
  }
  .stat-pill .val {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--ouro-claro);
    line-height: 1;
  }
  .stat-pill .lbl {
    font-size: 0.7rem;
    color: var(--cinza);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.2rem;
  }

  /* STANDINGS */
  .section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cinza);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--card-border);
  }
  .standings-table thead tr {
    background: #0a1f10;
    border-bottom: 2px solid var(--ouro);
  }
  .standings-table th {
    padding: 0.75rem 0.8rem;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ouro);
    font-weight: 700;
    white-space: nowrap;
  }
  .standings-table th.num { text-align: center; }
  .standings-table td {
    padding: 0.7rem 0.8rem;
    border-bottom: 1px solid #1a3525;
    font-size: 0.9rem;
    vertical-align: middle;
  }
  .standings-table tbody tr {
    transition: background 0.15s;
    cursor: pointer;
  }
  .standings-table tbody tr:hover { background: #1e4030; }
  .standings-table tbody tr:last-child td { border-bottom: none; }
  .standings-table td.num { text-align: center; }

  .pos-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-weight: 800;
    font-size: 0.85rem;
  }
  .pos-1 { background: #d4a017; color: #000; }
  .pos-2 { background: #aaa; color: #000; }
  .pos-3 { background: #b87333; color: #fff; }
  .pos-other { background: transparent; color: var(--cinza); }

  .player-name {
    font-weight: 700;
    color: var(--branco);
  }
  .player-nick {
    font-size: 0.75rem;
    color: var(--cinza);
    margin-top: 0.1rem;
  }

  .win-rate-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .bar-track {
    flex: 1;
    height: 5px;
    background: #1a3525;
    border-radius: 3px;
    min-width: 60px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--verde-claro), var(--ouro));
  }
  .wr-text {
    font-weight: 700;
    font-size: 0.85rem;
    min-width: 36px;
    text-align: right;
  }

  .form-badges {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }
  .form-w {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: var(--vitoria);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    color: #fff;
  }
  .form-l {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: var(--derrota);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    color: #fff;
  }
  .form-a {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: var(--ausente);
    opacity: 0.4;
  }

  .media-val {
    font-weight: 800;
    font-size: 0.9rem;
  }

  /* ALLTIME */
  .alltime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 0.75rem;
  }
  .alltime-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .alltime-card h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ouro);
    margin-bottom: 1rem;
  }
  .alltime-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid #1a3525;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
    padding: 0.5rem 0.4rem;
  }
  .alltime-row:hover { background: #1e4030; }
  .alltime-row:last-child { border-bottom: none; }
  .alltime-rank {
    font-size: 0.75rem;
    color: var(--cinza);
    min-width: 18px;
    text-align: center;
    font-weight: 700;
  }
  .alltime-name { flex: 1; font-weight: 600; font-size: 0.9rem; }
  .alltime-val {
    font-weight: 800;
    color: var(--ouro-claro);
    font-size: 0.9rem;
  }

  .champions-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .champion-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: #0a1f10;
    border-radius: 8px;
    padding: 0.75rem;
    border: 1px solid var(--card-border);
  }
  .champion-trophy { font-size: 1.5rem; }
  .champion-info .season { font-size: 0.7rem; color: var(--cinza); text-transform: uppercase; letter-spacing: 0.05em; }
  .champion-info .name { font-weight: 800; color: var(--ouro-claro); }
  .champion-stats { margin-left: auto; text-align: right; font-size: 0.75rem; color: var(--cinza-claro); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #112b1c;
    border: 1px solid var(--ouro);
    border-radius: 16px;
    width: 100%;
    max-width: 640px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 1.5rem;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: var(--cinza);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: var(--branco); }
  .modal-header {
    margin-bottom: 1.5rem;
  }
  .modal-header h2 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--ouro-claro);
  }
  .modal-header p {
    color: var(--cinza);
    font-size: 0.85rem;
    margin-top: 0.2rem;
  }
  .modal-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .modal-stat {
    background: #0a1f10;
    border-radius: 8px;
    padding: 0.75rem;
    text-align: center;
    border: 1px solid var(--card-border);
  }
  .modal-stat .val { font-size: 1.6rem; font-weight: 800; color: var(--ouro-claro); }
  .modal-stat .lbl { font-size: 0.65rem; text-transform: uppercase; color: var(--cinza); letter-spacing: 0.05em; margin-top: 0.2rem; }
  .modal-season-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .modal-season-table th {
    text-align: left;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ouro);
    padding: 0.5rem 0.4rem;
    border-bottom: 1px solid var(--card-border);
  }
  .modal-season-table td {
    padding: 0.6rem 0.4rem;
    border-bottom: 1px solid #1a3525;
    color: var(--cinza-claro);
  }
  .modal-season-table td:first-child { color: var(--branco); font-weight: 600; }
  .modal-season-table tr:last-child td { border-bottom: none; }
  .pos-medal { font-size: 1rem; }
  .trophy { color: var(--ouro); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--cinza);
    font-size: 0.75rem;
    border-top: 1px solid var(--card-border);
    margin-top: 3rem;
  }

  /* CAPA HERO */
  .capa-hero-wrap {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    background: var(--card-bg);
    border: 1px solid var(--ouro);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .capa-hero-img { flex-shrink: 0; width: 150px; border-radius: 8px; overflow: hidden; box-shadow: 0 6px 24px rgba(0,0,0,0.5); }
  .capa-hero-img img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; }
  .capa-hero-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0.5rem; }
  .capa-tag { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ouro); font-weight: 700; }
  .capa-hero-date { font-size: 1rem; font-weight: 700; color: var(--branco); }
  .capa-hero-link { font-size: 0.75rem; cursor: pointer; background: none; border: none; padding: 0; color: var(--cinza); text-decoration: underline; }
  .capa-hero-link:hover { color: var(--branco); }

  /* REPORT FORM */
  .report-section { margin-top: 2.5rem; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; }
  .report-header { background: #0a1f10; border-bottom: 2px solid var(--ouro); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  .report-header h3 { font-size: 1rem; font-weight: 800; color: var(--ouro-claro); }
  .server-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online  { background: var(--vitoria); box-shadow: 0 0 6px var(--vitoria); }
  .status-dot.offline { background: var(--derrota); }
  .status-dot.checking{ background: var(--ouro); animation: pulse 1s infinite; }
  .report-body { padding: 1.25rem; }
  .report-date-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .report-date-row label { font-size: 0.8rem; font-weight: 700; color: var(--cinza-claro); min-width: 70px; }
  .report-date-row select { background: #0a1f10; color: var(--branco); border: 1px solid var(--card-border); border-radius: 8px; padding: 0.45rem 0.75rem; font-size: 0.85rem; cursor: pointer; }
  .chips-section { margin-bottom: 1rem; }
  .chips-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 0.5rem; }
  .chips-label.v { color: var(--vitoria); }
  .chips-label.d { color: var(--derrota); }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip { display: inline-flex; align-items: center; background: #0a1f10; border: 1px solid var(--card-border); border-radius: 20px; padding: 0.3rem 0.7rem; font-size: 0.8rem; cursor: pointer; user-select: none; transition: all 0.15s; }
  .chip:hover { border-color: var(--cinza); }
  .chip.sv { background: rgba(46,204,113,0.15); border-color: var(--vitoria); color: var(--vitoria); font-weight: 700; }
  .chip.sd { background: rgba(231,76,60,0.15); border-color: var(--derrota); color: var(--derrota); font-weight: 700; }
  .report-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; font-size: 0.82rem; }
  .preview-box { background: #0a1f10; border-radius: 8px; padding: 0.75rem; min-height: 48px; }
  .preview-box .plbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; }
  .preview-box.pv .plbl { color: var(--vitoria); }
  .preview-box.pd .plbl { color: var(--derrota); }
  .preview-box .pnames { color: var(--cinza-claro); line-height: 1.6; }
  .report-extras { margin-bottom: 1rem; }
  .report-extras label { font-size: 0.75rem; color: var(--cinza); display: block; margin-bottom: 0.3rem; }
  .report-extras input { width: 100%; background: #0a1f10; border: 1px solid var(--card-border); border-radius: 8px; padding: 0.45rem 0.75rem; color: var(--branco); font-size: 0.85rem; }
  .report-actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .report-submit { background: var(--ouro); color: #000; border: none; border-radius: 8px; padding: 0.65rem 1.5rem; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: background 0.15s; }
  .report-submit:hover { background: var(--ouro-claro); }
  .report-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .report-msg { font-size: 0.82rem; flex: 1; }
  .report-msg.success { color: var(--vitoria); }
  .report-msg.error   { color: var(--derrota); }
  .reload-btn { background: var(--verde-claro); color: #fff; border: none; border-radius: 6px; padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.8rem; font-weight: 700; }

  /* JORNAIS */
  .jornal-upload-area {
    border: 2px dashed var(--verde-claro);
    border-radius: 14px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card-bg);
  }
  .jornal-upload-area:hover, .jornal-upload-area.dragging {
    border-color: var(--ouro);
    background: #1a3525;
  }
  .jornal-upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .jornal-upload-text { font-weight: 600; color: var(--branco); margin-bottom: 0.25rem; }
  .jornal-upload-sub { font-size: 0.75rem; color: var(--cinza); }

  .jornais-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
    margin-top: 0.75rem;
  }
  .jornais-empty {
    text-align: center;
    color: var(--cinza);
    padding: 3rem;
    font-size: 1rem;
  }
  .jornal-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .jornal-card:hover { transform: translateY(-3px); }
  .jornal-img-wrap { position: relative; }
  .jornal-img-wrap img {
    width: 100%;
    display: block;
    aspect-ratio: 3/4;
    object-fit: cover;
  }
  .jornal-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .jornal-card:hover .jornal-delete { opacity: 1; }
  .jornal-date {
    padding: 0.5rem 0.75rem 0.4rem;
    font-size: 0.75rem;
    color: var(--cinza-claro);
    font-weight: 600;
  }
  .jornal-caption {
    padding: 0 0.75rem 0.5rem;
    font-size: 0.72rem;
    color: var(--cinza);
    font-style: italic;
  }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .standings-table .hide-mobile { display: none; }
    .alltime-grid { grid-template-columns: 1fr; }
    .modal-stats-grid { grid-template-columns: repeat(3, 1fr); }
    .form-badges { max-width: 140px; }
  }

  /* TRANSITIONS */
  .fade-in {
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">⚽</span>
      <div class="logo-text">
        <h1>Retorta League</h1>
      </div>
    </div>
    <div class="header-badge" id="current-badge">Época Atual</div>
  </div>
</header>

<nav class="season-nav">
  <div class="season-tabs" id="season-tabs"></div>
</nav>

<main>
  <div id="content" class="fade-in"></div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer>
  Retorta League · Futebol de 5 · Todos os dados actualizados automaticamente a partir do ficheiro Excel

  if (pos === 3) return '🥉';
  return '';
}

function renderTabs() {
  const container = document.getElementById('season-tabs');
  container.innerHTML = '';
  SEASONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (s.id === activeTab ? ' active' : '');
    btn.textContent = s.label;
    if (s.atual) {
      const badge = document.createElement('span');
      badge.className = 'tab-badge';
      badge.textContent = 'AO VIVO';
      btn.appendChild(badge);
    }
    btn.onclick = () => switchTab(s.id);
    container.appendChild(btn);
  });
  // All-time tab
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (activeTab === 'alltime' ? ' active' : '');
  btn.textContent = 'Histórico Total';
  btn.onclick = () => switchTab('alltime');
  container.appendChild(btn);
  // Jornais tab
  const btn2 = document.createElement('button');
  btn2.className = 'tab-btn' + (activeTab === 'jornais' ? ' active' : '');
  btn2.textContent = '📰 Capas de Jornais';
  btn2.onclick = () => switchTab('jornais');
  container.appendChild(btn2);
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  const content = document.getElementById('content');
  content.classList.remove('fade-in');
  void content.offsetWidth;
  content.classList.add('fade-in');
  if (id === 'alltime') {
    renderAllTime();
  } else if (id === 'jornais') {
    renderJornais();
  } else {
    renderSeason(SEASONS.find(s => s.id === id));
  }
}

function renderSeason(season) {

  function recentForm(resultados) {
    const played = resultados.filter(r => r === 'W' || r === 'L');
    return played.slice(-5);
  }

  const rows = players.map(p => {
    const posCls = p.rank <= 3 ? `pos-${p.rank}` : 'pos-other';
    const posHtml = `<span class="pos-badge ${posCls}">${p.rank}</span>`;
    const wr = Math.round(p.winRate * 100);
    const barW = Math.min(wr, 100);
    const wrColor = wr >= 60 ? '#2ecc71' : wr >= 50 ? '#f0c040' : '#e74c3c';
    const form = recentForm(p.resultados);
    const formHtml = form.map(r => `<span class="form-${r.toLowerCase()}">${r}</span>`).join('');
    const mediaColor = p.mediaPonderada >= 0.5 ? '#2ecc71' : p.mediaPonderada >= 0.35 ? '#f0c040' : '#e74c3c';
    const allForm = p.resultados.map((r, i) => {
      if (r === 'W') return `<span class="form-w">V</span>`;
      if (r === 'L') return `<span class="form-l">D</span>`;
      return `<span class="form-a"></span>`;

    return `<tr onclick="openPlayerModal('${p.nome}')">

        <div class="player-name">${p.nome}</div>
        <div class="player-nick">${p.alcunha}</div>

            </div>

function renderAllTime() {
  // Aggregate stats per player across all seasons
  const playerMap = {};

  SEASONS.forEach(season => {
    season.jogadores.forEach(p => {
      if (!playerMap[p.nome]) {
        playerMap[p.nome] = {
          nome: p.nome,
          alcunha: p.alcunha,
          totalJogos: 0,
          totalVitorias: 0,
          totalDerrotas: 0,
          epocas: 0,
          melhoresResultados: []

      const entry = playerMap[p.nome];
      entry.totalJogos += p.jogos;
      entry.totalVitorias += p.vitorias;
      entry.totalDerrotas += p.derrotas;
      entry.epocas += 1;
      entry.melhoresResultados.push({ season: season.label, rank: p.rank, jogos: p.jogos, vitorias: p.vitorias, wr: p.winRate });

  const champHtml = champions.map((c, i) => `

  document.getElementById('content').innerHTML = `
    <div class="season-hero">
      <div class="season-title">
        <h2>Histórico Total</h2>

      <div class="season-stats">
        <div class="stat-pill"><div class="val">5</div><div class="lbl">Épocas</div></div>

function openPlayerModal(nome) {
  const playerData = {};

    const p = season.jogadores.find(j => j.nome === nome);
    if (p) playerData[season.id] = { season, player: p };
  });

  const entries = Object.values(playerData);
  if (entries.length === 0) return;

  const alcunha = entries[0].player.alcunha || nome;
  const totalJogos = entries.reduce((a, e) => a + e.player.jogos, 0);
  const totalVitorias = entries.reduce((a, e) => a + e.player.vitorias, 0);
  const totalDerrotas = entries.reduce((a, e) => a + e.player.derrotas, 0);
  const totalWR = totalJogos > 0 ? Math.round(totalVitorias / totalJogos * 100) : 0;
  const epocas = entries.length;

  const seasonRows = entries.map(e => {
    const p = e.player;
    const s = e.season;

      r === 'W' ? `<span class="form-w">V</span>` : `<span class="form-l">D</span>`
    ).join('');
    return `<tr>
      <td>${s.tipo.replace('Época de ','')} ${s.edicao}</td>
      <td style="text-align:center">${posIcon}</td>
      <td style="text-align:center">${p.jogos}</td>
      <td style="text-align:center;color:var(--vitoria)">${p.vitorias}</td>
      <td style="text-align:center;color:var(--derrota)">${p.derrotas}</td>
      <td style="text-align:center;color:${wrColor}">${wr}%</td>
      <td><div class="form-badges">${form}</div></td>
    </tr>`;
  }).join('');

  const wrColor = totalWR >= 60 ? 'var(--vitoria)' : totalWR >= 50 ? 'var(--ouro-claro)' : 'var(--derrota)';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <h2>${nome}</h2>

      <thead><tr>
        <th>Época</th><th>Pos</th><th>J</th><th>V</th><th>D</th><th>%</th><th>Forma Recente</th>
      </tr></thead>

function buildReportForm(season) {
  // Detect which dates already have results
  const playedSet = new Set();
  season.datas.forEach((d, i) => {
    if (season.jogadores.some(p => p.resultados[i] !== null)) playedSet.add(d);
  });

  // Default: first unplayed date in the past or most recent played
  const today = new Date();
  const pastDates = season.datas.filter(d => {
    const [dd,mm,yy] = d.split('/');
    return new Date(yy,mm-1,dd) <= today;
  });
  const nextDate = pastDates.find(d => !playedSet.has(d)) || pastDates[pastDates.length - 1] || season.datas[0];

  const dateOptions = season.datas.map(d => {
    const [dd,mm,yy] = d.split('/');
    const isPast = new Date(yy,mm-1,dd) <= today;
    const mark = playedSet.has(d) ? ' ✓' : (isPast ? ' ←' : '');
    return `<option value="${d}" ${d === nextDate ? 'selected' : ''} ${!isPast ? 'disabled style="color:#555"' : ''}>${d}${mark}</option>`;
  }).join('');

  const chips = season.jogadores.map(p =>
    `<span class="chip" data-name="${p.nome}" data-result="" onclick="toggleChip(this)">${p.alcunha}</span>`
  ).join('');

  return `
    <div class="report-section">
      <div class="report-header">
        <h3>📋 Reportar Jogo</h3>
        <div class="server-status" id="server-status">
          <span class="status-dot checking"></span>
          <span class="status-text">A verificar servidor...</span>
        </div>
      </div>
      <div class="report-body">
        <div class="report-date-row">
          <label>Jornada:</label>
          <select id="report-date">${dateOptions}</select>
        </div>

        <div class="chips-section">
          <div class="chips-label" style="color:var(--cinza-claro);margin-bottom:0.5rem">
            Clica nos jogadores: 1.º clique = <span style="color:var(--vitoria)">Vitória</span> · 2.º = <span style="color:var(--derrota)">Derrota</span> · 3.º = retirar
          </div>
          <div class="chips-wrap" id="chips-wrap">${chips}</div>
        </div>

        <div class="report-extras">
          <label>Outros jogadores não listados acima (separa por vírgula)</label>
          <input type="text" id="extra-winners" placeholder="Ex: Novo Jogador A, Novo Jogador B — todos na mesma equipa (V ou D)" oninput="updateChipPreview()">
          <div style="display:flex;gap:0.5rem;margin-top:0.4rem">
            <label style="margin:0"><input type="radio" name="extra-side" value="W" checked> Vitória</label>
            <label style="margin:0"><input type="radio" name="extra-side" value="L"> Derrota</label>
          </div>
        </div>

        <div class="report-preview">
          <div class="preview-box pv">
            <div class="plbl">✅ Equipa que ganhou</div>
            <div class="pnames" id="prev-v">—</div>
          </div>
          <div class="preview-box pd">
            <div class="plbl">❌ Equipa que perdeu</div>
            <div class="pnames" id="prev-d">—</div>
          </div>
        </div>

        <div class="report-actions">
          <button class="report-submit" id="report-submit" onclick="submitReport('${season.id}')">Enviar Resultado</button>
          <div class="report-msg" id="report-msg"></div>
        </div>
        <p style="font-size:0.7rem;color:var(--cinza);margin-top:0.75rem">
          Requer o servidor local activo: <code style="background:#0a1f10;padding:0.1rem 0.4rem;border-radius:4px">python3 server.py</code>
        </p>
      </div>
    </div>`;
}

function toggleChip(el) {
  const cur = el.dataset.result;
  if (cur === '')       { el.dataset.result = 'W'; el.className = 'chip sv'; }
  else if (cur === 'W') { el.dataset.result = 'L'; el.className = 'chip sd'; }
  else                  { el.dataset.result = '';  el.className = 'chip'; }
  updateChipPreview();
}

function updateChipPreview() {
  const winners = [], losers = [];
  document.querySelectorAll('.chip').forEach(c => {
    if (c.dataset.result === 'W') winners.push(c.dataset.name.split(' ')[0]);
    else if (c.dataset.result === 'L') losers.push(c.dataset.name.split(' ')[0]);
  });
  // extras
  const extraInput = document.getElementById('extra-winners');
  const extraSide = document.querySelector('input[name="extra-side"]:checked');
  if (extraInput && extraInput.value.trim()) {
    const extras = extraInput.value.split(',').map(s => s.trim()).filter(Boolean);
    if (extraSide && extraSide.value === 'W') winners.push(...extras);
    else losers.push(...extras);
  }
  const vEl = document.getElementById('prev-v');
  const dEl = document.getElementById('prev-d');
  if (vEl) vEl.textContent = winners.join(', ') || '—';
  if (dEl) dEl.textContent = losers.join(', ') || '—';
}

async function submitReport(seasonId) {
  const date = document.getElementById('report-date').value;

  const winners = [], losers = [];
  document.querySelectorAll('.chip').forEach(c => {
    if (c.dataset.result === 'W') winners.push(c.dataset.name);
    else if (c.dataset.result === 'L') losers.push(c.dataset.name);
  });

  // Add extras
  const extraInput = document.getElementById('extra-winners');
  const extraSide = document.querySelector('input[name="extra-side"]:checked');
  if (extraInput && extraInput.value.trim()) {
    const extras = extraInput.value.split(',').map(s => s.trim()).filter(Boolean);
    if (extraSide && extraSide.value === 'W') winners.push(...extras);
    else losers.push(...extras);
  }

  if (winners.length === 0 || losers.length === 0) {
    showReportMsg('Selecciona pelo menos um jogador em cada equipa.', 'error');
    return;
  }

  const btn = document.getElementById('report-submit');
  btn.disabled = true; btn.textContent = 'A enviar...';

  try {
    const res  = await fetch('http://localhost:8765/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ season_id: seasonId, date, winners, losers })
    });
    const data = await res.json();
    if (data.ok) {
      const nf = data.not_found.length ? ` (não encontrado: ${data.not_found.join(', ')})` : '';
      showReportMsg(
        `✅ ${data.updated.length} jogadores actualizados${nf}. ` +
        `<button class="reload-btn" onclick="location.reload()">Recarregar página</button>`,
        'success'
      );
    } else {
      showReportMsg('❌ ' + data.error, 'error');
    }
  } catch {
    showReportMsg('❌ Servidor não encontrado. Corre <strong>python3 server.py</strong> primeiro.', 'error');
  }
  btn.disabled = false; btn.textContent = 'Enviar Resultado';
}

function showReportMsg(html, cls) {
  const el = document.getElementById('report-msg');
  if (!el) return;
  el.innerHTML = html;
  el.className = 'report-msg ' + cls;
}

async function checkServer() {
  const el = document.getElementById('server-status');
  if (!el) return;
  try {
    const res = await fetch('http://localhost:8765/ping', { signal: AbortSignal.timeout(1500) });
    if (res.ok) {
      el.innerHTML = '<span class="status-dot online"></span><span class="status-text">Servidor ligado</span>';
      return;
    }
  } catch {}
  el.innerHTML = '<span class="status-dot offline"></span><span class="status-text">Servidor desligado</span>';
}

function formatDate(iso) {
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2,'0');
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${day} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
}

function compressImage(file, maxW, maxH, quality, cb) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = url;
}

function deleteJornal(id) {
  const list = loadJornais().filter(j => j.id !== id);
  saveJornais(list);
  renderJornais();
}

function renderJornais() {
  const list = loadJornais();
  const cards = list.length === 0
    ? `<div class="jornais-empty">Ainda não há capas. Faz upload da primeira! 📰</div>`
    : list.slice().reverse().map(j => `
        <div class="jornal-card">
          <div class="jornal-img-wrap">
            <img src="${j.src}" alt="Capa" loading="lazy">
            <button class="jornal-delete" onclick="deleteJornal('${j.id}')" title="Apagar">✕</button>
          </div>
          <div class="jornal-date">${formatDate(j.date)}</div>
          ${j.caption ? `<div class="jornal-caption">${j.caption}</div>` : ''}
        </div>
      `).join('');

  document.getElementById('content').innerHTML = `
    <div class="season-hero">
      <div class="season-title">
        <h2>Capas de Jornais</h2>
        <p>Guarda aqui as capas de jornais da Retorta League</p>
      </div>
      <div class="season-stats">
        <div class="stat-pill"><div class="val">${list.length}</div><div class="lbl">Capas</div></div>
      </div>
    </div>

    <div class="jornal-upload-area" id="jornal-drop" onclick="document.getElementById('jornal-input').click()">
      <div class="jornal-upload-icon">📰</div>
      <div class="jornal-upload-text">Clica ou arrasta uma imagem para fazer upload</div>
      <div class="jornal-upload-sub">JPG, PNG, WEBP — máx. 10 MB</div>
      <input type="file" id="jornal-input" accept="image/*" multiple style="display:none">
    </div>

    <div class="section-title" style="margin-top:2rem">Arquivo</div>
    <div class="jornais-grid">${cards}</div>
  `;

  // Wire up file input
  const input = document.getElementById('jornal-input');
  input.onchange = e => handleFiles(e.target.files);

  // Drag & drop
  const drop = document.getElementById('jornal-drop');
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragging'); };
  drop.ondragleave = () => drop.classList.remove('dragging');
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove('dragging'); handleFiles(e.dataTransfer.files); };
}

function handleFiles(files) {
  const list = loadJornais();
  let remaining = files.length;
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) { remaining--; return; }
    compressImage(file, 1200, 1600, 0.82, src => {
      list.push({ id: Date.now() + Math.random().toString(36).slice(2), src, date: new Date().toISOString(), caption: '' });
      remaining--;
      if (remaining === 0) { saveJornais(list); renderJornais(); }
    });
  });
}

// Init
renderTabs();
switchTab(activeTab);
</script>
